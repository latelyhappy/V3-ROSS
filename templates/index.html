<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V43.1 - Gauge Dashboard UI</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --neon-green: #39ff14; --neon-purple: #d292ff; 
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: hidden; padding-top: 50px; user-select: none; }
        #tactical-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; margin-right: 10px; }
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); color: #fff; }
        #workspace { position: relative; width: 100vw; min-height: 150vh; padding: 10px; box-sizing: border-box; overflow: hidden; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6); position: absolute; touch-action: none; }
        .window-panel::after { content: ''; position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, rgba(139, 148, 158, 0.4) 50%); z-index: 20; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 12px 15px; font-size: 13px; font-weight: bold; color: var(--text-muted); cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-weight: 500; font-size: 12px; position: sticky; top: 0; z-index: 10; padding: 12px 10px; text-align: left; box-shadow: 0 1px 0 rgba(48, 54, 61, 1); cursor: pointer;}
        th:hover { color: #fff; background: rgba(255,255,255,0.05); }
        td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(48, 54, 61, 0.5); font-size: 13px;}
        tr { transition: background 0.1s ease; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.06); }
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); } tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-blue .status-indicator { background: var(--blue); } tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-border .status-indicator { background: var(--text-muted); }
        tr.tr-vcp { background: rgba(227, 179, 65, 0.08); } 
        .trap-row { animation: blood-pulse 1.5s infinite; }
        @keyframes blood-pulse { 0% {background: transparent;} 50% {background: rgba(248, 81, 73, 0.2);} 100% {background: transparent;} }
        .translating { color: #8b949e; animation: text-pulse 2s infinite; font-size: 11px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-left: 5px; }
        @keyframes text-pulse { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }
        .vcp-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .vcp-bar { height: 100%; transition: width 0.5s ease, background 0.5s ease; }
        .sym { font-weight: bold; color: var(--text-main); font-size: 15px; }
        .up { color: var(--green); font-weight: bold;} .down { color: var(--red); font-weight: bold;}
        .elite-news-row { background: rgba(255,255,255,0.03); }
        .elite-title { color: #e1e4e8 !important; } 
        .neon-word { color: var(--neon-green); font-weight: 900; text-shadow: 0 0 5px rgba(57,255,20,0.4); }
        .vol-100k { color: var(--neon-purple); font-weight: bold; text-shadow: 0 0 5px rgba(210,146,255,0.3); } 

        #mobile-tabs { display: none; }
        body.mobile-mode { overflow-y: auto !important; padding-bottom: 60px; }
        body.mobile-mode #tactical-bar { overflow-x: auto; white-space: nowrap; padding-right: 20px; }
        body.mobile-mode #mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-surface); z-index: 10000; border-top: 1px solid var(--border); }
        body.mobile-mode .tab-btn { flex: 1; padding: 15px 0; background: transparent; border: none; color: var(--text-muted); font-weight: bold; font-size: 13px; cursor: pointer; }
        body.mobile-mode .tab-btn.active { color: var(--blue); border-top: 2px solid var(--blue); background: rgba(88, 166, 255, 0.05); }
        body.mobile-mode #workspace { display: block; overflow: visible; height: auto; min-height: auto; padding: 5px; }
        body.mobile-mode .window-panel { position: static !important; width: 100% !important; height: auto !important; min-height: 85vh; transform: none !important; margin-bottom: 15px; display: none; box-shadow: none; border: none; border-bottom: 1px solid var(--border); }
        body.mobile-mode .window-panel.active-tab { display: flex !important; }
        body.mobile-mode .window-panel::after { display: none; }
        body.mobile-mode .panel-header { cursor: default; }
        body.mobile-mode .hide-on-mobile { display: none !important; }
        
        body.mobile-mode .panel-content { overflow-x: auto !important; -webkit-overflow-scrolling: touch; padding-bottom: 15px;}
        body.mobile-mode table { font-size: 12px; width: 100%; min-width: max-content; } 
        body.mobile-mode th, body.mobile-mode td { padding: 12px 6px; white-space: nowrap; } 
        body.mobile-mode .sym { font-size: 14px; }
        body.mobile-mode .news-title-cell { max-width: 130px !important; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--red); color:var(--red);" onclick="unlockAudio()">🔇 音效</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 ETF</button>
        
        <div style="display:flex; align-items:center; border:1px solid var(--border); border-radius:6px; padding:4px 8px; margin-right:10px;">
            <span style="font-size:12px; color:var(--text-muted); margin-right:5px;">跳空門檻:</span>
            <input type="number" id="gap-input" value="5.0" step="0.5" style="background:transparent; border:none; color:var(--neon-green); width:40px; font-weight:bold; font-size:13px; outline:none; text-align:center;" onchange="updateGap(this.value)">
            <span style="font-size:12px; color:var(--text-muted);">%</span>
        </div>

        <button class="ghost-btn" style="border-color:var(--blue); color:var(--blue);" onclick="showAITrends()">🧠 AI 戰果詞庫</button>
        <button id="mode-btn" class="ghost-btn" style="border-color:var(--yellow); color:var(--yellow);" onclick="toggleMode()">📱 切換手機版</button>
        <button class="ghost-btn" onclick="resetLayout()">🔄 重置網格</button>
        <div style="font-size: 13px; color: var(--text-muted); font-family: monospace; margin-left:10px;">TPE: <span id="sys-clock" style="color: var(--text-main); font-weight: bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted);">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel">
            <div class="panel-header"><span>🚀 即時動能日誌</span></div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr>
                        <th class="status-indicator"></th><th>時間</th><th>代碼</th>
                        <th class="hide-on-mobile">流通股</th><th>價格</th><th class="hide-on-mobile">量比</th>
                        <th>加速</th>
                        <th class="hide-on-mobile">跳空</th>
                        <th class="hide-on-mobile">成交量</th><th>漲幅</th><th>訊號</th>
                    </tr></thead>
                    <tbody id="surge-log-body"><tr><td colspan="11" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-rank" class="window-panel active-tab">
            <div class="panel-header"><span>🏆 超新星排行</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('rank', 'Code')">代碼 <span id="sort-rank-Code"></span></th>
                        <th class="hide-on-mobile" onclick="setSort('rank', 'Float')">流通股 <span id="sort-rank-Float"></span></th>
                        <th onclick="setSort('rank', 'Price')">價格 <span id="sort-rank-Price"></span></th>
                        <th class="hide-on-mobile" onclick="setSort('rank', 'RelVol')">量比 <span id="sort-rank-RelVol"></span></th>
                        <th onclick="setSort('rank', 'VolAcc')">加速 <span id="sort-rank-VolAcc"></span></th>
                        <th onclick="setSort('rank', 'Gap')">跳空 <span id="sort-rank-Gap"></span></th>
                        <th class="hide-on-mobile" onclick="setSort('rank', 'Vol')">成交量 <span id="sort-rank-Vol"></span></th>
                        <th onclick="setSort('rank', 'Pct')">漲幅 <span id="sort-rank-Pct">▼</span></th>
                    </tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-news" class="window-panel">
            <div class="panel-header"><span>🗞️ 情報雷達</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('news', 'time')">時間 <span id="sort-news-time"></span></th>
                        <th onclick="setSort('news', 'Code')">代碼 <span id="sort-news-Code"></span></th>
                        <th onclick="setSort('news', 'CatScore')">評分 <span id="sort-news-CatScore">▼</span></th>
                        <th>標題</th>
                        <th class="hide-on-mobile" onclick="setSort('news', 'Float')">流通股 <span id="sort-news-Float"></span></th>
                        <th onclick="setSort('news', 'Price')">價格 <span id="sort-news-Price"></span></th>
                        <th class="hide-on-mobile" onclick="setSort('news', 'RelVol')">量比 <span id="sort-news-RelVol"></span></th>
                        <th onclick="setSort('news', 'VolAcc')">加速 <span id="sort-news-VolAcc"></span></th> 
                        <th class="hide-on-mobile" onclick="setSort('news', 'Gap')">跳空 <span id="sort-news-Gap"></span></th>
                        <th class="hide-on-mobile" onclick="setSort('news', 'Vol')">成交量 <span id="sort-news-Vol"></span></th>
                        <th onclick="setSort('news', 'Pct')">漲幅 <span id="sort-news-Pct"></span></th>
                    </tr></thead>
                    <tbody id="news-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與動態風控</div>
            <div class="panel-content" id="detail-list" style="padding: 20px; user-select: text;">
                <div style="text-align:center; color: var(--text-muted); padding: 60px 0;">點擊代碼載入戰報...</div>
            </div>
        </div>
    </div>

    <div id="mobile-tabs">
        <button class="tab-btn active" onclick="switchTab('win-rank', this)">🏆 排行</button>
        <button class="tab-btn" onclick="switchTab('win-log', this)">🚀 日誌</button>
        <button class="tab-btn" onclick="switchTab('win-news', this)">🗞️ 情報</button>
        <button class="tab-btn" onclick="switchTab('win-detail', this)">📊 戰報</button>
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = false, played = {}, showETF = false, lastTopNewsHeadline = ""; 
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };
        let rankCfg = { col: 'Pct', asc: false }, newsCfg = { col: 'CatScore', asc: false };

        let isMobileMode = window.innerWidth <= 768;
        if (isMobileMode) document.body.classList.add('mobile-mode');

        function updateGap(val) {
            let gapVal = parseFloat(val);
            if (isNaN(gapVal)) return;
            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ gap_pct: gapVal })
            }).then(r => r.json()).then(d => {
                document.getElementById('sys-status').innerText = `⚡ 跳空門檻已更新為 ${d.gap_pct}%，雷達強制重啟中...`;
                document.getElementById('sys-status').style.color = "var(--yellow)";
            }).catch(e => console.error(e));
        }

        function toggleMode() {
            isMobileMode = !isMobileMode;
            let btn = document.getElementById('mode-btn');
            if (isMobileMode) {
                document.body.classList.add('mobile-mode');
                btn.innerText = "💻 切換電腦版";
            } else {
                document.body.classList.remove('mobile-mode');
                btn.innerText = "📱 切換手機版";
                initWindowManager(); 
            }
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.window-panel').forEach(el => el.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active-tab');
            btn.classList.add('active');
        }

        function parseValue(val, col) {
            if (val === undefined || val === null || val === '-') return -999999;
            if (typeof val === 'string' && val.includes('N/A')) return -999999;
            if (col === 'Code' || col === 'time') return val.toString(); 
            let str = val.toString();
            let num = parseFloat(str.replace(/[^0-9.-]/g, '')) || 0; 
            if (col === 'Vol' || col === 'Float') {
                if (str.includes('M')) return num * 1000000;
                if (str.includes('K')) return num * 1000;
            }
            if (col === 'VolAcc' || col === 'RelVol' || col === 'Pct' || col === 'Gap') return parseFloat(str.replace(/[^0-9.-]/g, '')) || 0;
            return num;
        }

        function formatVolAcc(v) {
            if (!v || v === '-' || v.trim() === '') return `<span style="color:var(--text-muted);">-</span>`;
            if (v.includes('🔥')) return `<span style="color:var(--yellow); font-weight:bold;">${v}</span>`;
            if (v.includes('↗')) return `<span style="color:var(--green); font-weight:bold;">${v}</span>`;
            if (v.includes('↘')) return `<span style="color:var(--red);">${v}</span>`;
            if (v.includes('🧊')) return `<span style="color:var(--border);">${v}</span>`;
            return `<span style="color:var(--text-muted);">${v}</span>`;
        }

        function setSort(table, col) {
            let cfg = table === 'rank' ? rankCfg : newsCfg;
            if (cfg.col === col) cfg.asc = !cfg.asc; 
            else { cfg.col = col; cfg.asc = false; }
            document.querySelectorAll(`[id^="sort-${table}-"]`).forEach(el => el.innerText = "");
            document.getElementById(`sort-${table}-${col}`).innerText = cfg.asc ? "▲" : "▼";
            if (Object.keys(brain).length > 0) refreshUI(brain); 
        }

        function showAITrends() {
            if (!brain || !brain.live_trends) return alert("📡 系統尚未載入...");
            let msg = `🔥 V42 戰果加權 NLP 詞庫：\n📅 更新時間：${brain.trends_date || '未知'}\n\n`;
            Object.keys(brain.live_trends).forEach(k => { 
                let data = brain.live_trends[k];
                let score = typeof data === 'object' ? (data.score || 5) : data;
                let exp = typeof data === 'object' ? (data.avg_impact_pct || 0.0).toFixed(2) : "0.00";
                msg += `► 【 ${k} 】 (權重: ${score} | 歷史期望: +${exp}%)\n`; 
            });
            alert(msg);
        }

        function initWindowManager() {
            if (isMobileMode) return; 
            const wins = ['win-log', 'win-rank', 'win-news', 'win-detail'];
            
            let w_half = (window.innerWidth / 2) - 15;
            let h_half = (window.innerHeight / 2) - 35;
            const defL = {
                'win-log': {x:10, y:10, w: w_half, h: h_half},
                'win-detail': {x:10 + w_half + 10, y:10, w: w_half, h: h_half},
                'win-rank': {x:10, y:10 + h_half + 10, w: w_half, h: h_half},
                'win-news': {x:10 + w_half + 10, y:10 + h_half + 10, w: w_half, h: h_half}
            };

            wins.forEach(id => {
                const el = document.getElementById(id); if (!el) return;
                let s = JSON.parse(localStorage.getItem('sniper_v42_layout_' + id)) || defL[id];
                el.style.width = s.w+'px'; el.style.height = s.h+'px'; el.style.transform = `translate(${s.x}px, ${s.y}px)`;
                el.setAttribute('data-x', s.x); el.setAttribute('data-y', s.y);
                interact(el).draggable({ allowFrom:'.panel-header', listeners:{move:dML, end:sL} }).resizable({ edges:{right:true, bottom:true}, listeners:{move:rML, end:sL} });
            });
        }
        function dML(e) { let t=e.target, x=(parseFloat(t.getAttribute('data-x'))||0)+e.dx, y=(parseFloat(t.getAttribute('data-y'))||0)+e.dy; t.style.transform=`translate(${x}px, ${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y); }
        function rML(e) { let t=e.target, x=(parseFloat(t.getAttribute('data-x'))||0), y=(parseFloat(t.getAttribute('data-y'))||0); t.style.width=e.rect.width+'px'; t.style.height=e.rect.height+'px'; t.style.transform=`translate(${x}px, ${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y); }
        function sL() { ['win-log','win-rank','win-news','win-detail'].forEach(id=>{ let el=document.getElementById(id); if(el) localStorage.setItem('sniper_v42_layout_'+id, JSON.stringify({x:parseFloat(el.getAttribute('data-x'))||0, y:parseFloat(el.getAttribute('data-y'))||0, w:el.offsetWidth, h:el.offsetHeight})); }); }
        
        function resetLayout() { 
            localStorage.clear(); 
            location.reload(); 
        }
        
        function toggleETF() { showETF = !showETF; let btn = document.getElementById('etf-btn'); if (showETF) { btn.innerText = "🔘 隱藏 ETF"; btn.style.borderColor = "var(--red)"; btn.style.color = "var(--red)"; } else { btn.innerText = "🔘 ETF"; btn.style.borderColor = "var(--border)"; btn.style.color = "var(--text-main)"; } if (Object.keys(brain).length > 0) refreshUI(brain); }
        function unlockAudio() { audioOn = true; let btn = document.getElementById('audio-btn'); btn.style.borderColor="var(--green)"; btn.style.color="var(--green)"; btn.innerText="🔊 音效"; }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false}); }, 1000);
        
        function refresh() {
            fetch('/data?t=' + Date.now())
                .then(r => r.json())
                .then(d => { brain = d; refreshUI(d); setTimeout(refresh, 5000); })
                .catch(e => { 
                    document.getElementById('sys-status').innerText = "⚠️ 網路閃斷，重連中..."; 
                    document.getElementById('sys-status').style.color = "var(--red)"; 
                    setTimeout(refresh, 5000); 
                });
        }

        function highlightElites(text, elites, trends) {
            if (!elites || elites.length === 0) return text;
            let res = text;
            elites.forEach(w => {
                let regex = new RegExp(`\\b${w}\\b`, 'gi');
                let exp = trends && trends[w] && trends[w].avg_impact_pct > 15 ? ` <span style="color:#ffa500; font-size:10px;">(🔥+${trends[w].avg_impact_pct}%)</span>` : "";
                res = res.replace(regex, `<span class="neon-word">$&</span>${exp}`);
            });
            return res;
        }

        function refreshUI(d) {
            if (!d) return;
            
            let gapInput = document.getElementById('gap-input');
            if (d.current_gap !== undefined && document.activeElement !== gapInput) {
                gapInput.value = d.current_gap;
            }

            document.getElementById('sys-status').innerText = `📡 數據更新: ${d.last_update || '--:--:--'}`;
            document.getElementById('sys-status').style.color = "var(--green)";
            
            let h1 = "";
            (d.surge_log || []).forEach(r => {
                if (r.Type === 'fund' && !showETF) return; 
                let det = (d.details && d.details[r.Code]) ? d.details[r.Code] : {};
                let isFatal = r.Signal && r.Signal.includes("💀"), icon = isFatal ? " 💀" : ((det.CatScore || 0) > 8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                let rowClass = r.Status ? `tr-${r.Status}` : ""; if (r.Signal && r.Signal.includes("⚡VCP")) rowClass += " tr-vcp"; if (isFatal) rowClass += " trap-row"; 
                let f_float = r.Type === 'fund' ? '<span style="color:var(--border);">N/A(ETF)</span>' : (r.Float||'-');
                
                let f_vol = r.Vol || "-";
                if (r.Is100K) { f_vol = `<span class="vol-100k">${f_vol}</span>`; icon += " 📦"; }

                h1 += `<tr class="${rowClass}" onclick="loadDetail('${r.Code}')" ondblclick="openTW('${r.Code}')">
                    <td class="status-indicator"></td><td style="color:var(--text-muted);">${r.Time||'-'}</td><td class="sym">${r.Code}${icon}</td>
                    <td class="hide-on-mobile" style="color:var(--text-muted);">${f_float}</td><td>${r.Price||'-'}</td><td class="hide-on-mobile">${r.RelVol||'-'}</td>
                    <td>${formatVolAcc(r.VolAcc)}</td>
                    <td class="hide-on-mobile"><b class="${parseFloat(r.Gap||0)>0?'up':'down'}">${r.Gap||'-'}</b></td>
                    <td class="hide-on-mobile">${f_vol}</td>
                    <td class="${parseFloat(r.Pct||0)>0?'up':'down'}">${r.Pct||'-'}</td><td style="font-weight:bold;">${r.Signal||'-'}</td>
                </tr>`;
                if (r.Audio && r.SignalTS > (played[r.SignalTS] || 0) && audioOn) { played[r.SignalTS] = r.SignalTS; sounds[r.Audio].currentTime=0; sounds[r.Audio].play().catch(e=>{}); }
            });
            document.getElementById('surge-log-body').innerHTML = h1 || `<tr><td colspan="11" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr>`;

            let h2 = "", rankData = [...(d.leaderboard || [])].filter(r => !(r?.Type === 'fund' && !showETF));
            rankData.sort((a, b) => {
                let detA = d.details[a.Code] || {}, detB = d.details[b.Code] || {};
                let vA = (rankCfg.col==='Float') ? (a.Float||detA.Float) : ((rankCfg.col==='RelVol') ? (detA.RelVol||a.RelVol) : ((rankCfg.col==='VolAcc') ? (detA.VolAcc||a.VolAcc) : ((rankCfg.col==='Gap') ? (detA.Gap||a.Gap) : a[rankCfg.col])));
                let vB = (rankCfg.col==='Float') ? (b.Float||detB.Float) : ((rankCfg.col==='RelVol') ? (detB.RelVol||b.RelVol) : ((rankCfg.col==='VolAcc') ? (detB.VolAcc||b.VolAcc) : ((rankCfg.col==='Gap') ? (detB.Gap||b.Gap) : b[rankCfg.col])));
                vA = parseValue(vA, rankCfg.col); vB = parseValue(vB, rankCfg.col);
                if (vA < vB) return rankCfg.asc ? -1 : 1; if (vA > vB) return rankCfg.asc ? 1 : -1; return 0;
            });
            rankData.forEach(r => {
                let det = d.details[r.Code] || {}, isFatal = det.IsTrap;
                let icon = isFatal ? " 💀" : ((det.CatScore||0)>8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                let rowClass = `tr-${det.Status || r.Status || 'green'}`; if (isFatal) rowClass += " trap-row";
                
                let f_vol = r.Vol || "-";
                if (det.Is100K) { f_vol = `<span class="vol-100k">${f_vol}</span>`; icon += " 📦"; }

                h2 += `<tr class="${rowClass}" onclick="loadDetail('${r.Code}')" ondblclick="openTW('${r.Code}')">
                    <td class="status-indicator"></td><td class="sym">${r.Code}${icon}</td><td class="hide-on-mobile" style="color:var(--text-muted);">${r.Type==='fund'?'N/A':(r.Float||det.Float||"-")}</td>
                    <td>${r.Price||'-'}</td><td class="hide-on-mobile">${det.RelVol||r.RelVol||'-'}</td>
                    <td>${formatVolAcc(det.VolAcc||r.VolAcc)}</td>
                    <td><b class="${parseFloat(det.Gap||r.Gap||0)>0?'up':'down'}">${det.Gap||r.Gap||'-'}</b></td>
                    <td class="hide-on-mobile">${f_vol}</td><td class="${parseFloat(r.Pct||0)>0?'up':'down'}">${r.Pct||'-'}</td>
                </tr>`;
            });
            document.getElementById('rank-list').innerHTML = h2 || `<tr><td colspan="9" style="text-align:center; padding:20px; color:var(--text-muted);">無符合標的</td></tr>`;

            let h3 = "";
            if (d.top_catalysts && d.top_catalysts.length > 0) {
                let fVN = d.top_catalysts.find(n => n.NewsList && n.NewsList.length > 0);
                let cLH = fVN ? (fVN.NewsList[0].headline || fVN.NewsList[0].raw_title) : "";
                if (lastTopNewsHeadline !== "" && lastTopNewsHeadline !== cLH && audioOn) { sounds.nova.currentTime=0; sounds.nova.play().catch(e=>{}); }
                lastTopNewsHeadline = cLH;
                
                let newsData = [...d.top_catalysts].filter(n => !(n?.Type === 'fund' && !showETF) && n?.NewsList && n.NewsList.length > 0);
                newsData.sort((a, b) => {
                    let vA, vB;
                    if (newsCfg.col === 'time') { vA = a.NewsList[0]?.time||""; vB = b.NewsList[0]?.time||""; } 
                    else if (newsCfg.col === 'CatScore') { vA = a.CatScore!==undefined ? a.CatScore : (a.score||0); vB = b.CatScore!==undefined ? b.CatScore : (b.score||0); } 
                    else { vA = a[newsCfg.col]; vB = b[newsCfg.col]; }
                    vA = parseValue(vA, newsCfg.col); vB = parseValue(vB, newsCfg.col);
                    if (vA < vB) return newsCfg.asc ? -1 : 1; if (vA > vB) return newsCfg.asc ? 1 : -1; return 0;
                });

                newsData.forEach(n => {
                    let latest = n.NewsList[0];
                    let isElite = latest.elites && latest.elites.length > 0;
                    let hl_text = latest.title === "⏳ 翻譯中..." ? latest.raw_title : latest.title;
                    
                    hl_text = highlightElites(hl_text, latest.elites, d.live_trends);
                    if (latest.title === "⏳ 翻譯中...") hl_text += ` <span class="translating">⏳翻譯中...</span>`;

                    let f_Score = n.CatScore !== undefined ? n.CatScore : (n.score || 0);
                    let f_Pct = n.Pct || "-";
                    let f_Price = n.Price || "-";
                    let f_Float = n.Type === 'fund' ? 'N/A' : (n.Float || "-");
                    let f_Gap = n.Gap || "-";
                    
                    let f_vol = n.Vol || "-";
                    if (n.Is100K) { f_vol = `<span class="vol-100k">${f_vol} 📦</span>`; }
                    
                    let rowClass = isElite ? "elite-news-row" : "tr-green";
                    let titleClass = isElite ? "elite-title" : "";

                    h3 += `<tr class="${rowClass}" onclick="loadDetail('${n.Code||n.ticker}'); if(isMobileMode) switchTab('win-detail', document.querySelectorAll('.tab-btn')[3]);" ondblclick="openTW('${n.Code||n.ticker}')">
                        <td class="status-indicator" style="background:${f_Score >= 6 ? 'var(--yellow)' : 'var(--border)'};"></td>
                        <td style="color:${latest.is_today?'#ffa500':'var(--text-muted)'}; font-size:11px;">${latest.time||'-'}</td>
                        <td class="sym">${n.Code||n.ticker}</td><td style="color:${f_Score>=6?'var(--yellow)':'var(--text-muted)'}; font-weight:bold;">${f_Score}</td>
                        <td class="${titleClass} news-title-cell" style="font-size:12px; line-height:1.4; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${hl_text}</td>
                        <td class="hide-on-mobile" style="color:var(--text-muted);">${f_Float}</td>
                        <td>${f_Price}</td>
                        <td class="hide-on-mobile" style="color:var(--text-muted);">${n.RelVol||"-"}</td>
                        <td>${formatVolAcc(n.VolAcc)}</td>
                        <td class="hide-on-mobile"><b class="${parseFloat(f_Gap)>0?'up':'down'}">${f_Gap}</b></td>
                        <td class="hide-on-mobile">${f_vol}</td> 
                        <td class="${parseFloat(f_Pct)>0?'up':'down'}" style="font-weight:bold;">${f_Pct}</td>
                    </tr>`;
                });
                document.getElementById('news-list').innerHTML = h3 || `<tr><td colspan="12" style="text-align:center; padding:20px; color:var(--text-muted);">符合條件之情報已過濾</td></tr>`;
            } else { document.getElementById('news-list').innerHTML = `<tr><td colspan="12" style="text-align:center; padding:20px; color:var(--text-muted);">今日尚無重大情報</td></tr>`; }
            if(activeSym) loadDetail(activeSym);
        }

        function loadDetail(sym) {
            activeSym = sym; let d = (brain.details && brain.details[sym]) ? brain.details[sym] : null; let rankData = brain.leaderboard ? brain.leaderboard.find(x => x.Code === sym) : null;
            if (!d && !rankData) return; if (!d && rankData) d = { Price:rankData.Price, Pct:rankData.Pct, Vol:rankData.Vol, RelVol:"-", Float:rankData.Type==='fund'?"N/A(ETF)":(rankData.Float||"-"), StopLoss:0, CatScore:0, IsTrap:false, NewsList:[], VolAcc:"-", Is100K:false, Gap:"-", SN_Score:0, VsaState:0 };
            
            let trapWarn = d.IsTrap ? `<div style="background:rgba(248,81,73,0.2); border:1px solid var(--red); color:var(--red); padding:8px; margin-bottom:10px; border-radius:6px; font-weight:bold; font-size:13px; animation:blood-pulse 1s infinite;">🩸 致命警告：偵測到 S-1/S-3 增發稀釋</div>` : "";
            let vcpHTML = ""; if (d.Signal && d.Signal.includes("VCP")) { let m = d.Signal.match(/\((\d+)m\)/), mins = m ? parseInt(m[1]) : 1; vcpHTML = `<div style="font-size:11px; color:var(--text-muted);">⚡ 壓縮 (${mins} mins)</div><div class="vcp-bar-container"><div class="vcp-bar" style="width:${Math.min(mins*10,100)}%; background:${mins>=10?'#fff':(mins>=4?'#ffa500':'#e3b341')};"></div></div>`; }

            let volHTML = d.Is100K ? `<b class="vol-100k" style="font-size:14px;">${d.Vol||'-'} 📦</b>` : `<b style="color:var(--text-main); font-size:14px;">${d.Vol||'-'}</b>`;

            let snScore = d.SN_Score || 0;
            let vsaState = d.VsaState || 0;
            let snColor = "var(--text-muted)";
            let scoreLabel = "🧊 偏弱";
            let vsaWarning = "✅ 量價配合健康";
            let flashClass = "";
            
            // 💡 儀表板顏色與標籤判斷邏輯
            if (snScore >= 400) { scoreLabel = "🔥 極佳"; snColor = "var(--neon-green)"; }
            else if (snScore >= 200) { scoreLabel = "↗️ 過半"; snColor = "var(--yellow)"; }

            // 💡 陷阱覆蓋機制
            if (vsaState === 2) { vsaWarning = "🚨 致命出貨 (爆量滯漲)"; flashClass = "trap-row"; snColor = "var(--red)"; scoreLabel = "💀 危險"; }
            else if (vsaState === 1) { vsaWarning = "⚠️ 背離警告 (推升困難)"; snColor = "var(--red)"; scoreLabel = "⚠️ 背離"; }

            // 💡 SVG 儀表板動態計算
            let gaugeMax = 600;
            let fillRatio = Math.min(snScore / gaugeMax, 1);
            let dashOffset = 141.37 * (1 - fillRatio); // 141.37 是半徑 45 的半圓周長

            let gaugeHTML = `
            <div class="${flashClass}" style="position:relative; width:120px; height:70px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end;">
                <svg viewBox="0 0 120 70" style="position:absolute; top:0; left:0; width:100%; height:100%;">
                    <path d="M 15 60 A 45 45 0 0 1 105 60" fill="none" stroke="var(--border)" stroke-width="10" stroke-linecap="round" />
                    <path d="M 15 60 A 45 45 0 0 1 105 60" fill="none" stroke="${snColor}" stroke-width="10" stroke-linecap="round" stroke-dasharray="141.37" stroke-dashoffset="${dashOffset}" style="transition: stroke-dashoffset 1s ease-out; filter: drop-shadow(0 0 4px ${snColor});" />
                </svg>
                <div style="z-index:2; text-align:center; margin-bottom:-8px;">
                    <div style="font-size:22px; font-weight:900; color:${snColor}; line-height:1; text-shadow: 0 0 8px ${snColor}80;">${snScore}</div>
                    <div style="font-size:10px; color:${snColor}; font-weight:bold; margin-top:2px;">${scoreLabel}</div>
                </div>
            </div>
            `;

            let html = `<div style="text-align:center;">${trapWarn}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <div style="text-align:left; display:flex; flex-direction:column; justify-content:center;">
                        <h2 class="sym" style="font-size:28px; margin:0; display:flex; align-items:center;">
                            ${sym} <span style="font-size:18px; color:var(--text-muted); margin-left:10px;">${d.Price||'-'}</span>
                        </h2>
                        <div style="margin-top:5px; font-size:12px; color:${vsaState > 0 ? 'var(--red)' : 'var(--green)'}; font-weight:bold;">
                            ${vsaWarning}
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        ${gaugeHTML}
                        <button class="ghost-btn" style="padding:4px 10px; font-size:12px; height:fit-content; margin:0;" onclick="openTW('${sym}')">TV ↗</button>
                    </div>
                </div>
                
                <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; font-size:12px; border:1px solid rgba(255,255,255,0.05);">
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">成交量<br>${volHTML}</div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">量比<br><b style="color:var(--text-main); font-size:14px;">${d.RelVol||'-'}</b></div>
                    
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center; box-shadow: 0 0 5px rgba(227, 179, 65, 0.2);">量能加速<br><b style="font-size:14px;">${formatVolAcc(d.VolAcc)}</b></div>
                    
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">跳空<br><b class="${parseFloat(d.Gap||0)>0?'up':'down'}" style="font-size:14px;">${d.Gap||'-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">催化<br><b style="color:var(--yellow); font-size:14px;">${d.CatScore||0}</b></div>
                    
                    <div style="grid-column:span 2; padding-left:4px;">籌碼: <b style="color:var(--text-main);">${d.Float||'-'}</b></div>
                    <div style="grid-column:span 3; padding-left:4px;">當前狀態: <b style="color:${d.Signal.includes('洗盤')?'var(--text-muted)':'var(--yellow)'};">${d.Signal||'掃描中...'}</b></div>
                    ${vcpHTML ? `<div style="grid-column:1/-1;">${vcpHTML}</div>` : ''}
                </div>
                <h3 style="color:var(--text-muted); font-size:12px; border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:12px; margin-bottom:8px; text-align:left;">🗞️ 情報分析</h3>`;
            
            if (!d.NewsList || d.NewsList.length === 0) html += `<div style="text-align:left; color:var(--text-muted); font-size:13px;">近 3 日無新聞。</div>`;
            else d.NewsList.forEach(n => { 
                let d_title = n.title==="⏳ 翻譯中..."?n.raw_title:n.title;
                d_title = highlightElites(d_title, n.elites, brain.live_trends);
                html += `<div style="margin-bottom:8px; text-align:left; padding:10px; background:rgba(255,255,255,0.02); border-radius:6px; border-left:3px solid ${n.elites && n.elites.length>0?'var(--neon-green)':(n.is_today?'#ffa500':'var(--border)')};"><div style="color:${n.is_today?'#ffa500':'var(--text-muted)'}; font-size:11px; margin-bottom:4px; font-weight:bold;">${n.time} | 權重: ${n.score}</div><a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--text-main); font-size:13px;">${d_title}</a></div>`; 
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }
        window.onload = () => { initWindowManager(); refresh(); };
    </script>
</body>
</html>
