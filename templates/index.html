<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V59.0 - 解耦超頻消光版</title>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #2ea643; --red: #f85149; --blue: #58a6ff;
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, "Segoe UI", sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; user-select: none; font-size: 13px; }
        #tactical-bar { height: 42px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; box-sizing: border-box; flex-shrink: 0; z-index: 100; }
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 6px; }
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); }
        
        #workspace { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 6px; padding: 6px; flex: 1; background: #000; overflow: hidden; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 6px 12px; font-size: 13px; font-weight: bold; color: var(--text-muted); }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-size: 11px; position: sticky; top: 0; z-index: 10; padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 6px 8px; border-bottom: 1px solid rgba(48, 54, 61, 0.3); font-size: 12px; }
        
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-red .status-indicator { background: var(--red); }
        
        /* 🚀 戰術消光護眼配方 */
        .cyan-bg { background-color: rgba(13, 188, 212, 0.25) !important; color: #0df !important; font-weight: bold; text-align: center; }
        .gray-bg { background-color: rgba(255,255,255,0.02) !important; color: var(--text-muted); text-align: center; }
        .flash-green { background-color: rgba(46, 160, 67, 0.85) !important; color: #fff !important; }
        
        /* 🚀 Ross 同款：區塊式紅綠燈配色 */
        .badge-g { background: rgba(46, 160, 67, 0.2) !important; color: #56d364 !important; font-weight: 900; text-align: center; border-radius: 4px; padding: 4px; display: block; }
        .badge-r { background: rgba(248, 81, 73, 0.15) !important; color: #ff7b72 !important; font-weight: 900; text-align: center; border-radius: 4px; padding: 4px; display: block; }

        .sym { font-weight: 900; font-size: 15px; color: #fff; display: flex; align-items: center; }
        .tw-logo { width: 16px; height: 16px; vertical-align: middle; cursor: pointer; margin-left: 6px; fill: var(--blue); transition: transform 0.2s, fill 0.2s; }
        .tw-logo:hover { transform: scale(1.2); fill: #ffffff; }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button class="ghost-btn" style="color:var(--green); border-color:var(--green);">📡 雷達連線中</button>
        <div style="font-size: 12px; color: var(--text-muted); font-family: monospace; margin-left:10px;">TPE: <span id="sys-clock" style="color: #fff; font-weight: bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted);">系統初始化...</span>
    </div>

    <div id="workspace">
        <div class="window-panel">
            <div class="panel-header">🚀 湧浪動態日誌 (Surge Log)</div>
            <div class="panel-content">
                <table>
                    <thead><tr><th class="status-indicator"></th><th>時間</th><th>代碼/情報</th><th>現價</th><th>成交量</th><th>戰術訊號</th></tr></thead>
                    <tbody id="surge-body"></tbody>
                </table>
            </div>
        </div>

        <div class="window-panel">
            <div class="panel-header">📊 深度分析與風控</div>
            <div id="detail-pane" class="panel-content" style="padding:12px; font-family:monospace;">點擊代碼展開數據...</div>
        </div>

        <div class="window-panel" style="grid-column: span 2;">
            <div class="panel-header">🏆 狙擊陣型監控雷達 (Low Float Top Gainers)</div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th>漲幅 (%)</th><th>代碼/情報</th><th>現價</th><th>成交量</th><th>發行總股數</th><th>流通股數</th><th>即時量比</th>
                    </tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let activeSym = "";
        
        // 🚀 將 TV Logo 產生器移至前端
        function getTWLogo(sym) {
            return `<svg class="tw-logo" onclick="event.stopPropagation(); window.open('https://www.tradingview.com/chart/?symbol=${sym}', '_blank')" viewBox="0 0 24 24" title="開啟 TradingView"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.5h-2v-2h2v2zm0-4h-2v-6h2v6z"/></svg>`;
        }

        function refresh() {
            fetch('/data?t=' + Date.now()).then(r => r.json()).then(d => {
                document.getElementById('sys-status').innerText = `${d.tv_status || ''} | 📡 每秒輪詢同步中...`;
                
                // 1. 渲染湧浪日誌
                let h1 = "";
                (d.surge_log || []).forEach(r => {
                    let sig = r.Signal || '-';
                    if (sig.includes('金叉') || sig.includes('極限')) {
                        sig = `<span style="font-weight:900; color:var(--green);">${sig}</span>`;
                    }
                    
                    h1 += `<tr class="${r.Row_Status==='flash-green'?'flash-green':''}">
                        <td class="status-indicator"></td>
                        <td style="color:var(--text-muted); font-size:11px;">${r.Time}</td>
                        <td><div class="sym">${r.Code}</div></td>
                        <td><b>${r.Price}</b></td>
                        <td><b>${r.Vol}</b></td>
                        <td style="font-weight:bold;">${sig}</td>
                    </tr>`;
                });
                document.getElementById('surge-body').innerHTML = h1 || `<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--text-muted);">等待點火事件...</td></tr>`;

                // 2. 渲染監控排行榜
                let h2 = "";
                (d.leaderboard || []).forEach(r => {
                    let curPct = parseFloat(r.Pct) || 0;
                    let pctBadge = curPct >= 0 ? `<span class="badge-g">${r.Pct}</span>` : `<span class="badge-r">${r.Pct}</span>`;
                    
                    h2 += `<tr onclick="showDetail('${r.Code}')" style="cursor:pointer; ${r.Code===activeSym?'background:rgba(255,255,255,0.08);':''}">
                        <td class="status-indicator"></td>
                        <td style="width:90px;">${pctBadge}</td>
                        <td><div class="sym">${r.Code}${getTWLogo(r.Code)}</div></td>
                        <td><b style="font-size:13px;">${r.Price}</b></td>
                        <td><b>${r.Vol}</b></td>
                        <td>${r.Outstanding || '-'}</td>
                        <td class="${r.Float_Color}">${r.Float || '-'}</td>
                        <td style="color:var(--yellow); font-weight:bold;">${r.RelVol}</td>
                    </tr>`;
                });
                document.getElementById('rank-body').innerHTML = h2;
                
                if(activeSym && d.details[activeSym]) renderDetailPane(d.details[activeSym]);
                setTimeout(refresh, 1000); 
            }).catch(() => setTimeout(refresh, 2000));
        }

        function showDetail(sym) { activeSym = sym; }
        function renderDetailPane(d) {
            document.getElementById('detail-pane').innerHTML = `
                <h2 style="margin:0; color:#fff; display:flex; align-items:center;">
                    ${d.Code} ${getTWLogo(d.Code)}
                    <span style="color:var(--text-muted); font-size:14px; margin-left:8px;">${d.Price}</span>
                </h2>
                <hr style="border:none; border-top:1px solid var(--border); margin:8px 0;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; font-size:12px;">
                    <div>今日換手率: <b style="color:var(--neon-green);">${d.Turnover}</b></div>
                    <div>即時量比: <b style="color:var(--yellow);">${d.RelVol}</b></div>
                    <div>當前缺口: <b>${d.GapPct}%</b></div>
                    <div>風控守位: <b style="color:var(--red);">$${d.StopLoss.toFixed(2)}</b></div>
                </div>
            `;
        }

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12: false}); }, 1000);
        window.onload = refresh;
    </script>
</body>
</html>
