<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V40.3 - Tactical Command</title>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        
        body { 
            margin: 0; background: var(--bg-base); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            /* 💡 允許整體頁面上下滾動，以容納 1.5 倍高度 */
            overflow-y: auto; overflow-x: hidden;
            padding-top: 50px; user-select: none; 
        }

        /* 📡 頂部戰術導航欄 */
        #tactical-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); 
            z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box;
        }

        .ghost-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-main);
            padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: all 0.2s ease; touch-action: manipulation;
        }
        .ghost-btn:hover, .ghost-btn.active { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); color: #fff; }

        /* 🔲 專業網格佈局 (完美對齊，不跑位) */
        .dashboard-grid {
            display: grid;
            /* 左側佔滿剩餘空間，右側固定 480px 寬度 */
            grid-template-columns: minmax(600px, 1fr) 480px; 
            /* 分成上下兩列，平分高度 */
            grid-template-rows: 1fr 1fr; 
            gap: 20px;
            padding: 20px;
            /* 💡 整體高度拉長至螢幕的 1.5 倍 (150vh)，最低不小於 1200px */
            height: 150vh; 
            min-height: 1200px;
            box-sizing: border-box;
        }

        /* 指定每個面板在網格中的位置 */
        #win-log { grid-column: 1 / 2; grid-row: 1 / 2; }    /* 左上 */
        #win-rank { grid-column: 1 / 2; grid-row: 2 / 3; }   /* 左下 */
        #win-detail { grid-column: 2 / 3; grid-row: 1 / 3; } /* 右側，橫跨上下兩列 */

        .window-panel { 
            background: var(--bg-surface); border: 1px solid var(--border); 
            border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .panel-header { 
            background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); 
            padding: 12px 15px; font-size: 13px; font-weight: bold; color: var(--text-muted);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        /* 內部滾動區塊 */
        .panel-content { 
            flex: 1; /* 💡 自動拉伸填滿 1.5 倍的高度 */
            overflow-y: auto; overflow-x: hidden; padding: 0; position: relative;
        }

        /* 📊 固定表頭表格設計 */
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #161b22; color: var(--text-muted); font-weight: 500; font-size: 12px; 
            position: sticky; top: 0; z-index: 10; padding: 12px 10px; text-align: left;
            box-shadow: 0 1px 0 rgba(48, 54, 61, 1);
        }
        td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(48, 54, 61, 0.5); font-size: 13px;}
        tr { transition: background 0.1s ease; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.06); }

        /* 💡 狀態顏色指示器 */
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); }
        tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-blue .status-indicator { background: var(--blue); }
        tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-vcp { background: rgba(227, 179, 65, 0.08); } 

        .sym { font-weight: bold; color: var(--text-main); font-size: 15px; }
        .up { color: var(--green); font-weight: bold;} 
        .down { color: var(--red); font-weight: bold;}
        
        /* 📱 手機響應式覆寫 */
        @media (max-width: 1024px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
                grid-template-rows: auto auto auto; 
                height: auto; 
            }
            #win-log, #win-rank, #win-detail { grid-column: 1 / 2; grid-row: auto; height: 600px; }
        }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--red); color:var(--red); margin-right: 15px;" onclick="unlockAudio()">🔇 點擊啟用音效</button>
        <div style="font-size: 13px; color: var(--text-muted); font-family: monospace;">
            TPE: <span id="sys-clock" style="color: var(--text-main); font-weight: bold;">--:--:--</span>
        </div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted);">📡 系統初始化...</span>
    </div>

    <div class="dashboard-grid">
        
        <div id="win-log" class="window-panel">
            <div class="panel-header">
                <span>🚀 即時動能日誌</span>
                <span style="font-size: 11px; font-weight: normal; color:var(--text-muted);">單擊看新聞 / 雙擊開線圖</span>
            </div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr><th class="status-indicator"></th><th>時間</th><th>代碼</th><th>價格</th><th>量比</th><th>成交量</th><th>漲幅</th><th>訊號</th></tr></thead>
                    <tbody id="surge-log-body">
                        <tr><td colspan="8" style="text-align:center; padding: 40px; color: var(--text-muted);">雷達掃描中... 等待極端動能訊號觸發</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="win-rank" class="window-panel">
            <div class="panel-header">
                <span>🏆 全市場超新星排行 ($1-$30)</span>
                <span style="font-size: 11px; font-weight: normal; color:var(--text-muted);">單擊看新聞 / 雙擊開線圖</span>
            </div>
            <div class="panel-content">
                <table>
                    <thead><tr><th class="status-indicator"></th><th>代碼</th><th>流通股</th><th>價格</th><th>量比</th><th>成交量</th><th>漲幅</th></tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與動態風控</div>
            <div class="panel-content" id="detail-list" style="padding: 20px; user-select: text;">
                <div style="text-align:center; color: var(--text-muted); padding: 60px 0;">點擊左側代碼載入戰報...</div>
            </div>
        </div>
        
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = false, played = {};
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };

        function unlockAudio() { 
            audioOn = true; 
            let btn = document.getElementById('audio-btn');
            btn.style.borderColor = "var(--green)"; btn.style.color = "var(--green)";
            btn.innerText = "🔊 音效已啟用"; 
        }

        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        setInterval(() => {
            document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false});
        }, 1000);

        function refresh() {
            fetch('/data?t=' + Date.now())
                .then(r => r.json())
                .then(d => {
                    brain = d;
                    document.getElementById('sys-status').innerText = `📡 數據更新: ${d.last_update}`;
                    document.getElementById('sys-status').style.color = "var(--green)";
                    
                    if (d.surge_log.length > 0) {
                        let h1 = "";
                        d.surge_log.forEach(r => {
                            let det = d.details[r.Code] || {};
                            let icon = det.IsTrap ? " 💀" : (det.CatScore > 8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                            let rowClass = r.Status ? `tr-${r.Status}` : "";
                            if (r.Signal && r.Signal.includes("⚡VCP")) rowClass += " tr-vcp";
                            
                            h1 += `<tr class="${rowClass}" onclick="loadDetail('${r.Code}')" ondblclick="openTW('${r.Code}')">
                                <td class="status-indicator"></td>
                                <td style="color: var(--text-muted);">${r.Time}</td>
                                <td class="sym">${r.Code}${icon}</td>
                                <td>${r.Price}</td><td>${r.RelVol}</td><td>${r.Vol}</td>
                                <td class="${parseFloat(r.Pct)>0?'up':'down'}">${r.Pct}</td>
                                <td style="font-weight: bold;">${r.Signal}</td>
                            </tr>`;
                            
                            if (r.Audio && r.SignalTS > (played[r.SignalTS] || 0) && audioOn) { 
                                played[r.SignalTS] = r.SignalTS; 
                                sounds[r.Audio].currentTime = 0; 
                                sounds[r.Audio].play().catch(e=>{}); 
                            }
                        });
                        document.getElementById('surge-log-body').innerHTML = h1;
                    }

                    let h2 = "";
                    d.leaderboard.forEach(r => {
                        let det = d.details[r.Code] || {};
                        let icon = det.IsTrap ? " 💀" : (det.CatScore > 8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                        let rv = det.RelVol || r.RelVol;
                        let floatToUse = r.Float || det.Float || "-";
                        
                        h2 += `<tr class="tr-${det.Status || r.Status}" onclick="loadDetail('${r.Code}')" ondblclick="openTW('${r.Code}')">
                            <td class="status-indicator"></td>
                            <td class="sym">${r.Code}${icon}</td>
                            <td style="color:var(--text-muted);">${floatToUse}</td>
                            <td>${r.Price}</td><td>${rv}</td><td>${r.Vol}</td>
                            <td class="${parseFloat(r.Pct)>0?'up':'down'}">${r.Pct}</td>
                        </tr>`;
                    });
                    document.getElementById('rank-list').innerHTML = h2;
                    if(activeSym) loadDetail(activeSym);
                    
                    setTimeout(refresh, 5000); 
                })
                .catch(err => {
                    document.getElementById('sys-status').innerText = "⚠️ 網路閃斷，自動重連中...";
                    document.getElementById('sys-status').style.color = "var(--red)";
                    setTimeout(refresh, 5000); 
                });
        }

        function loadDetail(sym) {
            activeSym = sym; 
            let d = brain.details[sym]; 
            let rankData = brain.leaderboard ? brain.leaderboard.find(x => x.Code === sym) : null;

            if (!d && !rankData) return; 

            if (!d && rankData) {
                d = {
                    Price: rankData.Price, Pct: rankData.Pct, Vol: rankData.Vol, 
                    RelVol: "資料建立中...", Float: rankData.Float || "-", 
                    StopLoss: 0, CatScore: "未掃描", IsTrap: false, NewsList: []
                };
            }

            let trapWarn = d.IsTrap ? `<div style="background:rgba(248, 81, 73, 0.2); border: 1px solid var(--red); color: var(--red); padding:10px; margin-bottom:20px; border-radius:6px; font-weight:bold; font-size:14px;">⚠️ 偵測到 S-1/S-3 增發或陷阱字眼</div>` : "";
            let waitingMsg = (!brain.details[sym]) ? `<div style="color:var(--yellow); font-size:13px; margin-bottom:15px;">⚠️ K線資料尚未齊全 (可能為盤前)，部分進階數據與新聞待補...</div>` : "";
            
            let html = `<div style="text-align:center;">${trapWarn}${waitingMsg}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
                    <h2 ondblclick="openTW('${sym}')" class="sym" style="font-size:32px; margin:0; cursor:pointer;">${sym} <span style="font-size:22px; color:var(--text-muted); margin-left:10px;">${d.Price}</span></h2>
                    <button class="ghost-btn" onclick="openTW('${sym}')">在 TV 中開啟 ↗</button>
                </div>
                
                <div style="background: rgba(0,0,0,0.3); padding:20px; border-radius:8px; display:grid; grid-template-columns: 1fr 1fr; gap:15px; font-size:14px; text-align:left; border: 1px solid rgba(255,255,255,0.05);">
                    <div>成交總量: <b style="color:var(--text-main); font-size:15px;">${d.Vol}</b></div>
                    <div>當前量比: <b style="color:var(--text-main); font-size:15px;">${d.RelVol}</b></div>
                    <div>真實漲幅: <b class="${parseFloat(d.Pct)>0?'up':'down'}" style="font-size:15px;">${d.Pct}</b></div>
                    <div>催化強度: <b style="color:var(--yellow); font-size:15px;">${d.CatScore} Pts</b></div>
                    <div>真實籌碼: <b style="color:var(--text-main); font-size:15px;">${d.Float}</b></div>
                    <div style="border-top: 1px solid var(--border); grid-column: 1 / -1; margin-top: 10px; padding-top: 15px;">
                        動態風控停損: <b style="color:var(--red); font-size:18px;">$${(d.StopLoss||0).toFixed(2)}</b>
                    </div>
                </div>
                
                <h3 style="color: var(--text-muted); font-size:14px; text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:10px; margin-top:35px; text-align:left;">🗞️ 即時催化劑情報</h3>`;
            
            if (!d.NewsList || d.NewsList.length === 0) {
                html += `<div style="text-align:left; color:var(--text-muted); font-size: 14px; padding-top:10px;">${(!brain.details[sym]) ? "掃描排隊中..." : "尚無今日重大新聞。"}</div>`;
            } else {
                d.NewsList.forEach(n => {
                    let colorCls = n.is_today ? "color: var(--yellow);" : "color: var(--text-muted);";
                    html += `<div style="margin-top:20px; margin-bottom:20px; text-align:left; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 6px; border-left: 3px solid var(--border);">
                        <div style="${colorCls} font-size:12px; margin-bottom:8px; font-weight:bold;">${n.time} 美東 | 戰鬥權重: ${n.score}</div>
                        <a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--blue); font-size:15px; line-height:1.6;">${n.title}</a>
                    </div>`;
                });
            }
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }
        
        window.onload = () => { refresh(); };
    </script>
</body>
</html>
