<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V59.0 - Chimera Matrix (戰術消光抹茶綠版)</title>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --neon-green: #39ff14; --neon-purple: #d292ff; 
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, "Segoe UI", sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; user-select: none; font-size: 13px; }
        
        #tactical-bar { height: 42px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; box-sizing: border-box; flex-shrink: 0; z-index: 100; overflow-x: auto; white-space: nowrap; }
        #tactical-bar::-webkit-scrollbar { display: none; }
        
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s ease; margin-right: 6px; flex-shrink: 0;}
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); }
        
        #workspace { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 6px; padding: 6px; flex: 1; box-sizing: border-box; background: #000; overflow: hidden; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 6px 12px; font-size: 13px; font-weight: bold; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        .panel-content { flex: 1; overflow-y: auto; overflow-x: auto; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        .panel-content::-webkit-scrollbar { display: none; } 
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-size: 11px; position: sticky; top: 0; z-index: 10; padding: 8px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; }
        td { padding: 6px 8px; border-bottom: 1px solid rgba(48, 54, 61, 0.3); font-size: 12px; vertical-align: middle; line-height: 1.3; }
        tr { transition: background-color 0.2s ease; }
        tr:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
        
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); } tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-red .status-indicator { background: var(--red); } tr.tr-green .status-indicator { background: var(--green); }
        
        .new-alert-row { background-color: rgba(88, 166, 255, 0.05) !important; }
        
        .cyan-bg { background-color: rgba(13, 188, 212, 0.15) !important; color: #0df !important; font-weight: 900 !important; text-align: center; }
        .gray-bg { background-color: rgba(255,255,255,0.02) !important; color: var(--text-muted) !important; font-weight: bold !important; text-align: center; }
        
        /* 🚀 指令 3：暴漲亮綠色修改為「暗色戰術抹茶綠」 */
        .flash-green { background-color: #163e20 !important; color: #ffffff !important; transition: background-color 0.2s ease; }
        .flash-green td { border-color: rgba(255, 255, 255, 0.05); }
        .flash-green .sym, .flash-green span, .flash-green b { color: #8eeea3 !important; }

        .badge-g { background: rgba(46, 160, 67, 0.2) !important; color: #56d364 !important; font-weight: 900; text-align: center; border-radius: 4px; padding: 4px 6px; display: inline-block; min-width: 55px;}
        .badge-r { background: rgba(248, 81, 73, 0.15) !important; color: #ff7b72 !important; font-weight: 900; text-align: center; border-radius: 4px; padding: 4px 6px; display: inline-block; min-width: 55px;}

        .sym { font-weight: 900; font-size: 15px; color: #ffffff; letter-spacing: 0.5px; display: inline-flex; align-items: center;}
        .neon-word { color: var(--neon-green); font-weight: 900; }

        .tw-logo { width: 16px; height: 16px; cursor: pointer; margin-left: 6px; fill: var(--blue); }
        .sniper-target-row { background: rgba(163, 113, 247, 0.15) !important; }

        #mobile-tabs { display: none; }
        body.mobile-mode #mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: var(--bg-surface); z-index: 10000; border-top: 1px solid var(--border); }
        body.mobile-mode .tab-btn { flex: 1; padding: 0; background: transparent; border: none; color: var(--text-muted); font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        body.mobile-mode .tab-btn.active { color: var(--blue); border-top: 2px solid var(--blue); }
        body.mobile-mode #workspace { display: flex; flex-direction: column; height: calc(100vh - 92px); width: 100vw; }
        body.mobile-mode .window-panel { display: none; }
        body.mobile-mode .window-panel.active-tab { display: flex !important; }
        body.mobile-mode table { min-width: 700px; }
    </style>
</head>
<body id="main-body">
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--green); color:var(--green);" onclick="toggleAudio()">🔊 核心警報</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 ETF</button>
        <button id="summary-btn" class="ghost-btn" style="border-color:var(--neon-green); color:var(--neon-green);" onclick="fetchSummary()">📊 高勝率戰報</button>
        <button id="mode-btn" class="ghost-btn" style="border-color:var(--yellow); color:var(--yellow);" onclick="toggleMode()">📱 手機版</button>
        <button class="ghost-btn" style="border-color:var(--neon-purple); color:var(--neon-purple);" onclick="exportIntelligence()">📥 下載語料</button>
        <button class="ghost-btn" onclick="resetLayout()">🔄 重設</button>
        <div style="font-size: 12px; color: var(--text-muted); font-family: monospace; margin-left:8px;">TPE: <span id="sys-clock" style="color: var(--text-main); font-weight: bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted);">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel">
            <div class="panel-header">🚀 湧浪動態日誌 (Surge Log)</div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th>時間</th>
                        <th>代碼/情報</th>
                        <th>現價</th>
                        <th>成交量</th>
                        <th>量比</th>
                        <th>戰術訊號</th>
                    </tr></thead>
                    <tbody id="surge-log-body"><tr><td colspan="7" style="text-align:center; padding: 30px; color: var(--text-muted);">等待訊號觸發</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與風控</div>
            <div id="detail-list" class="panel-content" style="padding: 10px;">
                <div style="text-align:center; color: var(--text-muted); padding: 50px 0;">點擊代碼載入戰報...</div>
            </div>
        </div>

        <div id="win-rank" class="window-panel">
            <div class="panel-header">🏆 狙擊陣型監控雷達 (Low Float Top Gainers)</div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('rank', 'PctVal')">漲幅 (%) <span id="sort-rank-PctVal">▼</span></th>
                        <th onclick="setSort('rank', 'GapPct')">跳空 (%) <span id="sort-rank-GapPct"></span></th>
                        <th onclick="setSort('rank', 'Code')">代碼/情報 <span id="sort-rank-Code"></span></th>
                        <th onclick="setSort('rank', 'PriceVal')">現價 <span id="sort-rank-PriceVal"></span></th>
                        <th onclick="setSort('rank', 'Daily_Vol_Raw')">成交量 <span id="sort-rank-Daily_Vol_Raw"></span></th>
                        <th onclick="setSort('rank', 'Outstanding')">發行總股數 <span id="sort-rank-Outstanding"></span></th>
                        <th onclick="setSort('rank', 'Float')">流通股數 <span id="sort-rank-Float"></span></th>
                        <th onclick="setSort('rank', 'RelVol')">即時量比 <span id="sort-rank-RelVol"></span></th>
                    </tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-news" class="window-panel">
            <div class="panel-header">🗞️ 核心情報雷達</div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('news', 'time')">時間 <span id="sort-news-time"></span></th>
                        <th>代碼/缺口</th>
                        <th onclick="setSort('news', 'CatScore')">評分 <span id="sort-news-CatScore">▼</span></th>
                        <th>情報摘要</th>
                    </tr></thead>
                    <tbody id="news-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="mobile-tabs">
        <button class="tab-btn active" onclick="switchTab('win-rank', this)">🏆 排行</button>
        <button class="tab-btn" onclick="switchTab('win-log', this)">動態</button>
        <button class="tab-btn" onclick="switchTab('win-news', this)">🗞️ 情報</button>
        <button class="tab-btn" onclick="switchTab('win-detail', this)">📊 戰報</button>
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = true, played = {}, showETF = false;
        const sounds = { nova: new Audio('/static/sounds/nova.mp3') };
        let rankCfg = { col: 'PctVal', asc: false }, newsCfg = { col: 'CatScore', asc: false };
        let isMobileMode = window.innerWidth <= 768;
        if (isMobileMode) document.body.classList.add('mobile-mode');

        let alertRenderCount = {};
        let currentZoom = parseFloat(localStorage.getItem('sniper_zoom')) || 1.0;

        function applyZoom() { 
            if(!isMobileMode) {
                document.getElementById('main-body').style.zoom = currentZoom; 
            }
        }
        function changeZoom(delta) { 
            currentZoom = Math.min(Math.max(currentZoom + delta, 0.5), 2.0);
            localStorage.setItem('sniper_zoom', currentZoom); 
            applyZoom(); 
        }

        function toggleAudio() {
            audioOn = !audioOn;
            let btn = document.getElementById('audio-btn');
            btn.style.borderColor = audioOn ? "var(--green)" : "var(--red)";
            btn.style.color = audioOn ? "var(--green)" : "var(--red)";
            btn.innerText = audioOn ? "🔊 核心警報" : "🔇 音效 (已靜音)";
        }

        function toggleMode() { 
            isMobileMode = !isMobileMode; 
            document.body.classList.toggle('mobile-mode', isMobileMode);
            document.getElementById('mode-btn').innerText = isMobileMode ? "💻 電腦版" : "📱 手機版"; 
            if(!isMobileMode) applyZoom(); else document.getElementById('main-body').style.zoom = 1.0;
        }

        function switchTab(tabId, btn) { 
            document.querySelectorAll('.window-panel').forEach(el => el.classList.remove('active-tab')); 
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); 
            document.getElementById(tabId).classList.add('active-tab'); 
            btn.classList.add('active'); 
        }
        function toggleETF() { showETF = !showETF; if (Object.keys(brain).length > 0) refreshUI(brain); }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        function parseValue(val, col) {
            if (val === undefined || val === null || val === '-' || val === '載入中...') return -999999;
            let cleanStr = val.toString().replace(/<[^>]*>?/gm, ''); 
            let num = parseFloat(cleanStr.replace(/[^0-9.-]/g, '')) || 0;
            if (cleanStr.toUpperCase().includes('M')) num *= 1000000;
            if (cleanStr.toUpperCase().includes('K')) num *= 1000;
            return num;
        }

        function setSort(table, col) {
            let cfg = table === 'rank' ? rankCfg : newsCfg;
            if (cfg.col === col) cfg.asc = !cfg.asc; else { cfg.col = col; cfg.asc = false; }
            if (Object.keys(brain).length > 0) refreshUI(brain);
        }

        function highlightElites(text, elites) {
            if (!text) return text;
            let res = text;
            if (!elites || elites.length === 0) return res;
            elites.forEach(w => { let regex = new RegExp(`\\b${w}\\b`, 'gi'); res = res.replace(regex, `<span class="neon-word">$&</span>`); });
            return res;
        }

        function refresh() { 
            fetch('/data?t=' + Date.now()).then(r => r.json()).then(d => { brain = d; refreshUI(d); setTimeout(refresh, 1000); }).catch(e => setTimeout(refresh, 2000)); 
        }

        function refreshUI(d) {
            if (!d) return;
            document.getElementById('sys-status').innerHTML = `<span style="color:var(--neon-purple); font-weight:bold;">${d.tv_status || ''}</span> &nbsp;|&nbsp; 更新: <span style="color:#fff">${d.last_update || '--:--:--'}</span>`;
            
           let h1 = "";
            (d.surge_log || []).forEach(r => {
                let f_Code = r.Code || "N/A";
                let sigId = f_Code + "_" + r.SignalTS;
                currentSigIds.add(sigId);
                alertRenderCount[sigId] = (alertRenderCount[sigId] || 0) + 1;
                let isNew = alertRenderCount[sigId] <= 5;
                
                let rowClass = r.Status ? `tr-${r.Status}` : ""; 
                if (isNew) rowClass += " new-alert-row";
                if (r.Row_Status === 'flash-green') rowClass += " flash-green";
                
                // 🚀 接收後端傳來的巨鯨與跳空徽章
                let badges = r.Badges ? `<span style="font-size:12px; margin-left:4px;" title="特殊戰術狀態">${r.Badges}</span>` : "";
                
                let sig = (r.Signal || '-').replace(/<[^>]*>?/gm, '');
                // 讓突破心理關卡等文字高亮
                if(sig.includes('突破')) {
                    sig = sig.replace(/\(突破([^)]+)\)/, '<span style="color:var(--yellow); font-weight:bold;">(突破$1)</span>');
                }

                let safeRelVol = typeof r.RelVol === 'string' && r.RelVol.length > 8 ? parseFloat(r.RelVol.replace('x','')).toFixed(2) + 'x' : (r.RelVol || '-');

                h1 += `<tr class="${rowClass}" onclick="loadDetail('${f_Code}')" ondblclick="openTW('${f_Code}')">
                    <td class="status-indicator"></td>
                    <td style="color:var(--text-muted); font-size:11px;">${r.Time}</td>
                    <td><div class="sym">${f_Code} ${badges}</div></td>
                    <td><b style="font-size:14px;">${r.Price||'-'}</b></td>
                    <td><b style="font-size:14px;">${r.Vol||'-'}</b></td>
                    <td><b style="color:var(--yellow); font-size:13px;">${safeRelVol}</b></td>
                    <td style="font-weight:bold; font-size:13px;">${sig}</td>
                </tr>`;
                if (r.Audio && r.SignalTS > (played[r.SignalTS] || 0) && audioOn) { played[r.SignalTS] = r.SignalTS; sounds.nova.play().catch(e=>{}); }
            });
            document.getElementById('surge-log-body').innerHTML = h1 || `<tr><td colspan="7" style="text-align:center; padding: 30px; color: var(--text-muted);">等待訊號</td></tr>`;

            let h2 = "", rankData = [...(d.leaderboard || [])];
            rankData.sort((a, b) => {
                let vA = parseValue(a[rankCfg.col], rankCfg.col); let vB = parseValue(b[rankCfg.col], rankCfg.col);
                return (vA < vB) ? (rankCfg.asc ? -1 : 1) : (vA > vB ? (rankCfg.asc ? 1 : -1) : 0);
            });
            
            rankData.forEach(r => {
                let f_Code = r.Code || "N/A";
                let gapVal = parseFloat(r.GapPct) || 0;
                let gapBadge = gapVal >= 0 ? `<span style="color:#56d364; font-weight:bold;">+${gapVal.toFixed(2)}%</span>` : `<span style="color:#ff7b72; font-weight:bold;">${gapVal.toFixed(2)}%</span>`;
                let pctBadge = parseFloat(r.PctVal) >= 0 ? `<span class="badge-g">${r.Pct||'-'}</span>` : `<span class="badge-r">${r.Pct||'-'}</span>`;
                
                // 🚀 指令 2：極簡代碼，支援點擊直接分析
                let symHtml = `<span class="sym" style="cursor:pointer;" onclick="loadDetail('${f_Code}')" ondblclick="event.stopPropagation(); openTW('${f_Code}')">${f_Code}</span>`;

                h2 += `<tr onclick="loadDetail('${f_Code}');" ondblclick="openTW('${f_Code}')">
                    <td class="status-indicator"></td>
                    <td>${pctBadge}</td>
                    <td><b>${gapBadge}</b></td> <td>${symHtml}</td>
                    <td><b style="font-size:14px;">${r.Price||'-'}</b></td>
                    <td><b>${r.Vol||'-'}</b></td>
                    <td><b>${r.Outstanding||'-'}</b></td>
                    <td class="${r.Float_Color || 'gray-bg'}"><b>${r.Float||'-'}</b></td>
                    <td><b style="color:var(--yellow);">${r.RelVol||'-'}</b></td>
                </tr>`;
            });
            document.getElementById('rank-list').innerHTML = h2;

            let h3 = "", newsData = [...(d.top_catalysts || [])].filter(n => n.NewsList && n.NewsList.length > 0);
            newsData.forEach(n => {
                let latest = n.NewsList[0]; let f_Score = n.CatScore || 0;
                let hl_text = highlightElites(latest.title, latest.elites);
                h3 += `<tr onclick="loadDetail('${n.Code}');">
                    <td class="status-indicator" style="background:${f_Score >= 6 ? 'var(--yellow)' : 'var(--border)'};"></td>
                    <td style="color:var(--text-muted); font-size:10px;">${latest.time}</td>
                    <td class="sym">${n.Code}</td>
                    <td style="font-weight:bold; color:${f_Score>=6?'var(--yellow)':'var(--text-muted)'};">${f_Score}</td>
                    <td>${hl_text}</td>
                </tr>`;
            });
            document.getElementById('news-list').innerHTML = h3;
            if(activeSym) loadDetail(activeSym);
        }

        function loadDetail(sym) {
            activeSym = sym; let d = brain.details?.[sym]; if (!d) return;
            let snScore = d.SN_Score || 0;
            let html = `<div style="text-align:left;">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:4px;">
                    <div><h2 style="font-size:18px; margin:0; display:inline-flex; align-items:center;">${sym}</h2><span style="font-size:16px; margin-left:6px;">${d.Price||'-'}</span></div>
                    <div style="font-weight:900; color:var(--yellow)">SCORE: ${snScore}</div>
                </div>
                <div style="display:flex; gap:6px; margin:6px 0; font-size:12px;">
                    <div style="background:rgba(255,255,255,0.05); padding:4px 6px; border-radius:3px;">跳空: <b>${(d.GapPct||0).toFixed(2)}%</b></div>
                    <div style="background:rgba(255,255,255,0.05); padding:4px 6px; border-radius:3px;">量比: <b>${d.RelVol||'-'}</b></div>
                </div>
                <h3 style="color:var(--text-muted); font-size:11px; margin:6px 0;">🗞️ 情報分析</h3>`;
            if (!d.NewsList || d.NewsList.length === 0) html += `<div style="font-size:11px; color:var(--text-muted);">無新聞。</div>`;
            else d.NewsList.forEach(n => { 
                html += `<div style="margin-bottom:4px; padding:4px; background:rgba(255,255,255,0.01); border-radius:3px;">
                    <span style="color:var(--text-muted); font-size:10px;">${n.time}</span> [Score: ${n.score}] <a href="${n.link}" target="_blank" style="color:var(--text-main); text-decoration:none;">${n.title}</a></div>`; 
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }

        function fetchSummary() { alert("高勝率語料正在動態歸納中..."); }
        function exportIntelligence() { window.location.href='/api/export_intelligence'; }
        function resetLayout() { localStorage.removeItem('sniper_zoom'); location.reload(); }
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false}); }, 1000);
        window.onload = () => { applyZoom(); refresh(); };
    </script>
</body>
</html>
