<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V41.9 - Full Armor Command</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { 
            margin: 0; background: var(--bg-base); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-y: auto; overflow-x: hidden; padding-top: 50px; user-select: none; 
        }
        #tactical-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); 
            z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box;
        }
        .ghost-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-main);
            padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: all 0.2s ease; touch-action: manipulation; margin-right: 10px;
        }
        .ghost-btn:hover, .ghost-btn.active { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); color: #fff; }
        
        #workspace { position: relative; width: 100vw; min-height: 150vh; padding: 10px; box-sizing: border-box; overflow: hidden; }
        .window-panel { 
            background: var(--bg-surface); border: 1px solid var(--border); 
            border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); position: absolute; touch-action: none;
        }
        .window-panel::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(139, 148, 158, 0.4) 50%); z-index: 20;
        }
        .panel-header { 
            background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); 
            padding: 12px 15px; font-size: 13px; font-weight: bold; color: var(--text-muted);
            cursor: move; display: flex; justify-content: space-between; align-items: center;
        }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; position: relative; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-weight: 500; font-size: 12px; position: sticky; top: 0; z-index: 10; padding: 12px 10px; text-align: left; box-shadow: 0 1px 0 rgba(48, 54, 61, 1); }
        td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(48, 54, 61, 0.5); font-size: 13px;}
        tr { transition: background 0.1s ease; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.06); }

        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); }
        tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-blue .status-indicator { background: var(--blue); }
        tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-vcp { background: rgba(227, 179, 65, 0.08); } 
        
        /* 🩸 致命血條警告特效 */
        .trap-row { animation: blood-pulse 1.5s infinite; }
        @keyframes blood-pulse { 0% {background: transparent;} 50% {background: rgba(248, 81, 73, 0.2);} 100% {background: transparent;} }
        
        /* ⏳ 翻譯降級特效 */
        .translating { color: #8b949e; animation: text-pulse 2s infinite; font-size: 11px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-left: 5px; }
        @keyframes text-pulse { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }

        /* ⚡ VCP 蓄力條 */
        .vcp-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .vcp-bar { height: 100%; transition: width 0.5s ease, background 0.5s ease; }

        .sym { font-weight: bold; color: var(--text-main); font-size: 15px; }
        .up { color: var(--green); font-weight: bold;} .down { color: var(--red); font-weight: bold;}
        
        @media (max-width: 1024px) {
            #workspace { display: flex; flex-direction: column; gap: 20px; }
            .window-panel { position: relative !important; transform: none !important; width: 100% !important; height: 500px !important; margin-bottom: 20px; }
            .panel-header { cursor: default; } .window-panel::after { display: none; }
        }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="color:var(--red);" onclick="unlockAudio()">🔇 啟用音效</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 顯示 ETF</button>
        
        <button class="ghost-btn" style="border-color:var(--blue); color:var(--blue);" onclick="showAITrends()">🧠 查看 AI 學習詞彙</button>
        
        <div style="font-size:13px; color:var(--text-muted); margin-left:10px;">TPE: <span id="sys-clock" style="color:#fff;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px;">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel">
            <div class="panel-header"><span>🚀 即時動能日誌</span><span style="font-size: 11px; color:var(--text-muted);">單擊看新聞 / 雙擊開圖</span></div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr><th class="status-indicator"></th><th>時間</th><th>代碼</th><th>流通股</th><th>價格</th><th>量比</th><th>成交量</th><th>漲幅</th><th>訊號</th></tr></thead>
                    <tbody id="surge-log-body"><tr><td colspan="9" style="text-align:center; padding: 40px; color: var(--text-muted);">雷達掃描中... 等待極端動能訊號觸發</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-rank" class="window-panel">
            <div class="panel-header"><span>🏆 超新星排行 ($1-$30)</span><span style="font-size: 11px; color:var(--text-muted);">單擊看新聞 / 雙擊開圖</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr><th class="status-indicator"></th><th>代碼</th><th>流通股</th><th>價格</th><th>量比</th><th>成交量</th><th>漲幅</th></tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-news" class="window-panel">
            <div class="panel-header"><span>🗞️ 全情報新聞雷達 (近 3 日)</span><span style="font-size: 11px; color:var(--text-muted);">單擊看詳情 / 雙擊開圖</span></div>
            <div class="panel-content">
                <table>
                    <thead>
                        <tr>
                            <th class="status-indicator"></th>
                            <th>時間</th><th>代碼</th><th>評分</th><th>標題</th>
                            <th>流通股</th><th>量比</th><th>成交量</th><th>漲幅</th>
                        </tr>
                    </thead>
                    <tbody id="news-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與動態風控</div>
            <div class="panel-content" id="detail-list" style="padding: 20px; user-select: text;">
                <div style="text-align:center; color: var(--text-muted); padding: 60px 0;">點擊代碼載入戰報...</div>
            </div>
        </div>
    </div>

    <script>
        // 💡 預設 showETF = false，完全隱藏槓桿 ETF
        let brain = {}, activeSym = "", audioOn = false, played = {}, showETF = false;
        let lastTopNewsHeadline = ""; 
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };

        function initWindowManager() {
            if (window.innerWidth <= 1024) return; 
            const wins = ['win-log', 'win-rank', 'win-news', 'win-detail'];
            const defaultLayout = {
                'win-log': {x: 10, y: 10, w: 750, h: 450},
                'win-rank': {x: 10, y: 480, w: 750, h: 450},
                'win-news': {x: 780, y: 480, w: 650, h: 450},
                'win-detail': {x: 780, y: 10, w: 650, h: 450}
            };

            wins.forEach(id => {
                const el = document.getElementById(id);
                let saved = JSON.parse(localStorage.getItem('sniper_v41_1_layout_' + id));
                if (!saved) saved = defaultLayout[id];

                el.style.width = saved.w + 'px'; el.style.height = saved.h + 'px';
                el.style.transform = `translate(${saved.x}px, ${saved.y}px)`;
                el.setAttribute('data-x', saved.x); el.setAttribute('data-y', saved.y);

                interact(el).draggable({ 
                    allowFrom: '.panel-header', modifiers: [interact.modifiers.restrictRect({restriction: '#workspace'})],
                    listeners: { move: dragMoveListener, end: saveLayout } 
                }).resizable({ 
                    edges: { left: false, right: true, bottom: true, top: false },
                    modifiers: [interact.modifiers.restrictSize({min: {width: 400, height: 300}})],
                    listeners: { move: resizeMoveListener, end: saveLayout } 
                });
            });
        }

        function dragMoveListener(event) {
            const target = event.target;
            const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
            const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
            target.style.transform = `translate(${x}px, ${y}px)`;
            target.setAttribute('data-x', x); target.setAttribute('data-y', y);
        }
        function resizeMoveListener(event) {
            const target = event.target;
            let x = (parseFloat(target.getAttribute('data-x')) || 0);
            let y = (parseFloat(target.getAttribute('data-y')) || 0);
            target.style.width = event.rect.width + 'px'; target.style.height = event.rect.height + 'px';
            target.style.transform = `translate(${x}px, ${y}px)`;
            target.setAttribute('data-x', x); target.setAttribute('data-y', y);
        }
        function saveLayout() {
            ['win-log', 'win-rank', 'win-news', 'win-detail'].forEach(id => {
                const el = document.getElementById(id);
                const x = parseFloat(el.getAttribute('data-x')) || 0; const y = parseFloat(el.getAttribute('data-y')) || 0;
                localStorage.setItem('sniper_v41_1_layout_' + id, JSON.stringify({x: x, y: y, w: el.offsetWidth, h: el.offsetHeight}));
            });
            let ind = document.getElementById('save-status');
            ind.style.opacity = 1; setTimeout(() => { ind.style.opacity = 0; }, 2000);
        }

        function resetLayout() { localStorage.clear(); location.reload(); }
        
        function toggleETF() { 
            showETF = !showETF; 
            let btn = document.getElementById('etf-btn');
            if (showETF) { 
                btn.innerText = "🔘 隱藏 ETF / 槓桿"; 
                btn.style.borderColor = "var(--red)"; btn.style.color = "var(--red)";
            } else { 
                btn.innerText = "🔘 顯示 ETF / 槓桿"; 
                btn.style.borderColor = "var(--border)"; btn.style.color = "var(--text-main)";
            }
            if (Object.keys(brain).length > 0) refreshUI(brain); 
        }

        function unlockAudio() { 
            audioOn = true; 
            let btn = document.getElementById('audio-btn');
            btn.style.borderColor = "var(--green)"; btn.style.color = "var(--green)"; btn.innerText = "🔊 音效已啟用"; 
        }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        // 💡 顯示 AI 學習詞彙的函數 (V41.13 日期與防呆版)
        function showAITrends() {
            if (!brain || !brain.live_trends) {
                return alert("📡 系統尚未載入學習數據，請稍後再試...");
            }
            
            let trends = brain.live_trends;
            let keys = Object.keys(trends);
            
            if (keys.length === 0) {
                return alert("📉 目前 trends.json 為空，今日 NLP 引擎尚未提煉出新詞彙。");
            }
            
            let msg = `🔥 近期 NLP 引擎自動提煉的高頻核彈詞彙：\n📅 學習完成時間 (TPE)：${brain.trends_date || '未知'}\n\n`;
            let formatError = false;
            
            keys.forEach(k => {
                let val = trends[k];
                // 🛡️ 防呆診斷：如果讀取到的是物件 (例如 BLACK: {...})
                if (typeof val === 'object') {
                    formatError = true;
                } else {
                    msg += `► 【 ${k} 】 (自動賦予權重: +${val}分)\n`;
                }
            });
            
            if (formatError) {
                msg = "⚠️ 系統警告：偵測到 trends.json 格式異常！\n\n系統讀取到了 BLACK, RED 等分類標籤，這代表目前的 trends.json 裡面裝錯了 catalysts.json 的內容。\n\n💡 解決方案：請手動將 trends.json 的內容完全清空 (改成 {} )，NLP 引擎會在下一次掃描時自動填入正確的單字！";
            }
            
            alert(msg);
        }

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false}); }, 1000);

        function refresh() {
            fetch('/data?t=' + Date.now())
                .then(r => r.json())
                .then(d => { brain = d; refreshUI(d); setTimeout(refresh, 5000); })
                .catch(e => { document.getElementById('sys-status').innerText = "⚠️ 網路閃斷，重連中..."; document.getElementById('sys-status').style.color = "var(--red)"; setTimeout(refresh, 5000); });
        }

        function refreshUI(d) {
            // 🛡️ 防禦1：如果後端資料斷線，直接跳出不執行
            if (!d || !d.details) return; 
            
            document.getElementById('sys-status').innerText = `📡 數據更新: ${d.last_update || '--:--:--'}`;
            document.getElementById('sys-status').style.color = "var(--green)";
            
            // 1. 日誌 (加入 ?. 防禦)
            if (d.surge_log && d.surge_log.length > 0) {
                let h1 = "";
                d.surge_log.forEach(r => {
                    if (r?.Type === 'fund' && !showETF) return; 

                    let det = d.details[r?.Code] || {};
                    let isFatal = r?.Signal && r.Signal.includes("💀");
                    let icon = isFatal ? " 💀" : ((det.CatScore || 0) > 8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                    let rowClass = r?.Status ? `tr-${r.Status}` : "";
                    if (r?.Signal && r.Signal.includes("⚡VCP")) rowClass += " tr-vcp";
                    if (isFatal) rowClass += " trap-row"; 
                    
                    let floatDisplay = r?.Type === 'fund' ? '<span style="color:var(--border);">N/A (ETF)</span>' : (r?.Float || '-');

                    h1 += `<tr class="${rowClass}" onclick="loadDetail('${r?.Code}')" ondblclick="openTW('${r?.Code}')">
                        <td class="status-indicator"></td>
                        <td style="color: var(--text-muted);">${r?.Time || '-'}</td>
                        <td class="sym">${r?.Code}${icon}</td>
                        <td style="color: var(--text-muted);">${floatDisplay}</td>
                        <td>${r?.Price || '-'}</td><td>${r?.RelVol || '-'}</td><td>${r?.Vol || '-'}</td>
                        <td class="${parseFloat(r?.Pct||0)>0?'up':'down'}">${r?.Pct || '-'}</td>
                        <td style="font-weight: bold;">${r?.Signal || '-'}</td>
                    </tr>`;
                });
                document.getElementById('surge-log-body').innerHTML = h1;
            }

            // 2. 排行榜 (加入 ?. 防禦)
            let h2 = "";
            (d.leaderboard || []).forEach(r => {
                if (r?.Type === 'fund' && !showETF) return; 
                
                let det = d.details[r?.Code] || {};
                let isFatal = det.IsTrap;
                let icon = isFatal ? " 💀" : ((det.CatScore || 0) > 8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                let rv = det.RelVol || r?.RelVol || '-';
                let floatToUse = r?.Type === 'fund' ? `<span style="color:var(--border);">N/A (ETF)</span>` : (r?.Float || det.Float || "-");
                let rowClass = `tr-${det.Status || r?.Status || 'green'}`;
                if (isFatal) rowClass += " trap-row";

                h2 += `<tr class="${rowClass}" onclick="loadDetail('${r?.Code}')" ondblclick="openTW('${r?.Code}')">
                    <td class="status-indicator"></td>
                    <td class="sym">${r?.Code}${icon}</td>
                    <td style="color:var(--text-muted);">${floatToUse}</td>
                    <td>${r?.Price || '-'}</td><td>${rv}</td><td>${r?.Vol || '-'}</td>
                    <td class="${parseFloat(r?.Pct||0)>0?'up':'down'}">${r?.Pct || '-'}</td>
                </tr>`;
            });
            document.getElementById('rank-list').innerHTML = h2 || `<tr><td colspan="7" style="text-align:center; padding: 20px; color: var(--text-muted);">無符合條件之標的</td></tr>`;

            // 3. 情報聚合器
            if (d.top_catalysts && d.top_catalysts.length > 0) {
                let h3 = "";
                d.top_catalysts.forEach(n => {
                    if (n?.Type === 'fund' && !showETF) return; 
                    
                    let newsList = n?.NewsList || [];
                    if (newsList.length === 0) return; 

                    let latest = newsList[0];
                    let hl = latest?.title === "⏳ 翻譯中..." ? `${latest?.raw_title} <span class="translating">⏳翻譯中...</span>` : (latest?.title || '-');
                    let timeColor = latest?.is_today ? "#ffa500" : "var(--text-muted)";
                    
                    let symCode = n?.Code || n?.ticker || '-';
                    let f_Float = n?.Type === 'fund' ? '<span style="color:var(--border);">N/A (ETF)</span>' : (n?.Float || "-");
                    let f_RelVol = n?.RelVol || "-";
                    let f_Vol = n?.Vol || "-";
                    let f_Pct = n?.Pct || "-";
                    let f_Score = n?.CatScore !== undefined ? n.CatScore : (n?.score || 0);

                    h3 += `<tr class="tr-green" onclick="loadDetail('${symCode}')" ondblclick="openTW('${symCode}')">
                        <td class="status-indicator" style="background:${f_Score >= 6 ? 'var(--yellow)' : 'var(--border)'};"></td>
                        <td style="color: ${timeColor}; font-weight: bold; font-size: 11px;">${latest?.time || '-'}</td>
                        <td class="sym">${symCode}</td>
                        <td style="color:${f_Score >= 6 ? 'var(--yellow)' : 'var(--text-muted)'}; font-weight:bold;">${f_Score}</td>
                        <td style="font-size:12px; line-height:1.4; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${hl}</td>
                        <td style="color: var(--text-muted);">${f_Float}</td>
                        <td style="color: var(--text-muted);">${f_RelVol}</td>
                        <td style="color: var(--text-muted);">${f_Vol}</td>
                        <td class="${parseFloat(f_Pct)>0?'up':'down'}" style="font-weight:bold;">${f_Pct}</td>
                    </tr>`;
                });
                document.getElementById('news-list').innerHTML = h3;
            }

            if(activeSym) loadDetail(activeSym);
        }

        // 4. 戰情報告 (緊湊版 HUD 排版)
        function loadDetail(sym) {
            activeSym = sym; 
            let d = (brain.details && brain.details[sym]) ? brain.details[sym] : null; 
            let rankData = brain.leaderboard ? brain.leaderboard.find(x => x.Code === sym) : null;
            
            if (!d && !rankData) return; 
            if (!d && rankData) d = { Price: rankData.Price, Pct: rankData.Pct, Vol: rankData.Vol, RelVol: "-", Float: rankData.Type==='fund' ? "N/A (ETF)" : (rankData.Float||"-"), StopLoss: 0, CatScore: 0, IsTrap: false, NewsList: [] };

            let trapWarn = d.IsTrap ? `<div style="background:rgba(248, 81, 73, 0.2); border: 1px solid var(--red); color: var(--red); padding:8px; margin-bottom:10px; border-radius:6px; font-weight:bold; font-size:13px; animation: blood-pulse 1s infinite;">🩸 致命警告：偵測到 S-1/S-3 增發稀釋文件</div>` : "";
            let waitingMsg = (!d.Price || d.Price === "-") ? `<div style="color:var(--yellow); font-size:12px; margin-bottom:10px;">⚠️ K線資料尚未齊全...</div>` : "";
            
            let vcpBarHTML = "";
            if (d.Signal && d.Signal.includes("VCP")) {
                let durationMatch = d.Signal.match(/\((\d+)m\)/);
                let mins = durationMatch ? parseInt(durationMatch[1]) : 1;
                let barColor = mins >= 10 ? "#ffffff" : (mins >= 4 ? "#ffa500" : "#e3b341");
                let barWidth = Math.min(mins * 10, 100); 
                let pulseClass = mins >= 10 ? "trap-row" : "";
                vcpBarHTML = `<div style="font-size:11px; color:var(--text-muted); margin-bottom:2px;">⚡ 壓縮蓄力進度 (${mins} mins)</div><div class="vcp-bar-container ${pulseClass}" style="margin-top:2px;"><div class="vcp-bar" style="width: ${barWidth}%; background: ${barColor}; box-shadow: 0 0 8px ${barColor};"></div></div>`;
            }

            let html = `<div style="text-align:center;">${trapWarn}${waitingMsg}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                    <h2 ondblclick="openTW('${sym}')" class="sym" style="font-size:26px; margin:0; cursor:pointer;">${sym} <span style="font-size:18px; color:var(--text-muted); margin-left:8px;">${d.Price || '-'}</span></h2>
                    <button class="ghost-btn" style="padding: 4px 10px; font-size:12px;" onclick="openTW('${sym}')">在 TV 中開啟 ↗</button>
                </div>
                
                <div style="background: rgba(0,0,0,0.3); padding:10px 12px; border-radius:8px; display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; font-size:12px; text-align:left; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="background:rgba(255,255,255,0.02); padding:6px; border-radius:4px; text-align:center;">成交量<br><b style="color:var(--text-main); font-size:14px;">${d.Vol || '-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; border-radius:4px; text-align:center;">量比<br><b style="color:var(--text-main); font-size:14px;">${d.RelVol || '-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; border-radius:4px; text-align:center;">真實漲幅<br><b class="${parseFloat(d.Pct||0)>0?'up':'down'}" style="font-size:14px;">${d.Pct || '-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; border-radius:4px; text-align:center;">催化強度<br><b style="color:var(--yellow); font-size:14px;">${d.CatScore || 0} Pts</b></div>
                    
                    <div style="grid-column: span 2; padding-left:4px; margin-top:2px;">真實籌碼: <b style="color:var(--text-main); font-size:13px;">${d.Float || '-'}</b></div>
                    <div style="grid-column: span 2; padding-left:4px; margin-top:2px;">風控停損: <b style="color:var(--red); font-size:14px;">$${(d.StopLoss||0).toFixed(2)}</b></div>
                    ${vcpBarHTML ? `<div style="grid-column: 1 / -1; margin-top: 2px;">${vcpBarHTML}</div>` : ''}
                </div>
                
                <h3 style="color: var(--text-muted); font-size:12px; border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:12px; margin-bottom:8px; text-align:left;">🗞️ 即時催化劑情報</h3>`;
            
            if (!d.NewsList || d.NewsList.length === 0) {
                html += `<div style="text-align:left; color:var(--text-muted); font-size: 13px; padding-top:5px;">近 3 日尚無重大新聞。</div>`;
            } else {
                d.NewsList.forEach(n => {
                    let colorCls = n.is_today ? "color: #ffa500;" : "color: var(--text-muted);";
                    let borderCls = n.is_today ? "3px solid #ffa500" : "3px solid var(--border)";
                    let hl = n.title === "⏳ 翻譯中..." ? `${n.raw_title} <span class="translating">⏳翻譯中...</span>` : n.title;
                    
                    html += `<div style="margin-bottom:8px; text-align:left; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 6px; border-left: ${borderCls};">
                        <div style="${colorCls} font-size:11px; margin-bottom:4px; font-weight:bold;">${n.time} 美東 | 戰鬥權重: ${n.score}</div>
                        <a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--blue); font-size:13px; line-height:1.4;">${hl}</a>
                    </div>`;
                });
            }
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }
        window.onload = () => { initWindowManager(); refresh(); };
    </script>
</body>
</html>
