<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V45 - Chimera Fire Control</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --neon-green: #39ff14; --neon-purple: #d292ff; 
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: auto; padding-top: 50px; user-select: none; }
        
        #tactical-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        #tactical-bar::-webkit-scrollbar { display: none; }
        
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; margin-right: 10px; flex-shrink: 0;}
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); color: #fff; }
        
        #workspace { position: relative; width: 200vw; min-height: 150vh; padding: 10px; box-sizing: border-box; overflow: visible; }
        
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6); position: absolute; touch-action: none; }
        .window-panel::after { content: ''; position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, rgba(139, 148, 158, 0.4) 50%); z-index: 20; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 12px 15px; font-size: 13px; font-weight: bold; color: var(--text-muted); cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-weight: 500; font-size: 12px; position: sticky; top: 0; z-index: 10; padding: 12px 10px; text-align: left; box-shadow: 0 1px 0 rgba(48, 54, 61, 1); cursor: pointer;}
        th:hover { color: #fff; background: rgba(255,255,255,0.05); }
        td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(48, 54, 61, 0.5); font-size: 13px;}
        tr { transition: background 0.1s ease; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.06); }
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); } tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-blue .status-indicator { background: var(--blue); } tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-red .status-indicator { background: var(--red); } tr.tr-border .status-indicator { background: var(--text-muted); }
        tr.tr-vcp { background: rgba(227, 179, 65, 0.08); } 
        
        /* 💡 動量增量閃爍系統：定義紫色(上漲)與紅色(下跌)動畫 */
        @keyframes flash-purple {
            0% { background-color: rgba(163, 113, 247, 0.8); color: white; text-shadow: 0 0 10px rgba(255,255,255,0.8); box-shadow: inset 0 0 20px rgba(163, 113, 247, 1); }
            50% { background-color: rgba(163, 113, 247, 0.2); color: var(--neon-purple); text-shadow: none; box-shadow: none; }
            100% { background-color: rgba(163, 113, 247, 0.8); color: white; text-shadow: 0 0 10px rgba(255,255,255,0.8); box-shadow: inset 0 0 20px rgba(163, 113, 247, 1); }
        }
        @keyframes flash-red {
            0% { background-color: rgba(248, 81, 73, 0.8); color: white; text-shadow: 0 0 10px rgba(255,255,255,0.8); box-shadow: inset 0 0 20px rgba(248, 81, 73, 1); }
            50% { background-color: rgba(248, 81, 73, 0.2); color: var(--red); text-shadow: none; box-shadow: none; }
            100% { background-color: rgba(248, 81, 73, 0.8); color: white; text-shadow: 0 0 10px rgba(255,255,255,0.8); box-shadow: inset 0 0 20px rgba(248, 81, 73, 1); }
        }

        .flash-active-up { animation: flash-purple 0.8s infinite; border-radius: 4px; font-weight: 900 !important; }
        .flash-active-down { animation: flash-red 0.8s infinite; border-radius: 4px; font-weight: 900 !important; }
        
        .flash-settled-up { background-color: rgba(163, 113, 247, 0.2) !important; color: var(--neon-purple) !important; font-weight: bold; border-radius: 4px; padding: 2px 6px; }
        .flash-settled-down { background-color: rgba(248, 81, 73, 0.2) !important; color: var(--red) !important; font-weight: bold; border-radius: 4px; padding: 2px 6px; }

        @keyframes blood-pulse { 
            0% {background-color: rgba(248, 81, 73, 0.4);} 
            50% {background-color: rgba(248, 81, 73, 0.1);} 
            100% {background-color: rgba(248, 81, 73, 0.4);} 
        }
        .trap-active { animation: blood-pulse 0.8s infinite !important; }
        .trap-settled { background-color: rgba(248, 81, 73, 0.15) !important; } 

        .translating { color: #8b949e; animation: text-pulse 2s infinite; font-size: 11px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-left: 5px; }
        @keyframes text-pulse { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }
        .vcp-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .vcp-bar { height: 100%; transition: width 0.5s ease, background 0.5s ease; }
        .sym { font-weight: bold; color: var(--text-main); font-size: 15px; }
        .up { color: var(--green); font-weight: bold;} .down { color: var(--red); font-weight: bold;}
        .elite-news-row { background: rgba(255,255,255,0.03); }
        .elite-title { color: #e1e4e8 !important; } 
        .neon-word { color: var(--neon-green); font-weight: 900; text-shadow: 0 0 5px rgba(57,255,20,0.4); }
        .vol-100k { color: var(--neon-purple); font-weight: bold; text-shadow: 0 0 5px rgba(210,146,255,0.3); } 

        #mobile-tabs { display: none; }
        
        body.mobile-mode { overflow-y: auto !important; overflow-x: hidden !important; padding-bottom: 60px; }
        body.mobile-mode #tactical-bar { overflow-x: auto; white-space: nowrap; padding-right: 20px; }
        body.mobile-mode #mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-surface); z-index: 10000; border-top: 1px solid var(--border); }
        body.mobile-mode .tab-btn { flex: 1; padding: 15px 0; background: transparent; border: none; color: var(--text-muted); font-weight: bold; font-size: 13px; cursor: pointer; }
        body.mobile-mode .tab-btn.active { color: var(--blue); border-top: 2px solid var(--blue); background: rgba(88, 166, 255, 0.05); }
        body.mobile-mode #workspace { display: block; overflow: hidden; height: auto; min-height: auto; padding: 5px; width: 100vw; box-sizing: border-box; }
        body.mobile-mode .window-panel { position: static !important; width: 100% !important; height: auto !important; min-height: 85vh; transform: none !important; margin-bottom: 15px; display: none; box-shadow: none; border: none; border-bottom: 1px solid var(--border); }
        body.mobile-mode .window-panel.active-tab { display: flex !important; flex-direction: column; }
        body.mobile-mode .window-panel::after { display: none; }
        body.mobile-mode .panel-header { cursor: default; }
        body.mobile-mode .panel-content { flex: 1; overflow-x: auto !important; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 15px; width: 100%; display: block; }
        body.mobile-mode table { font-size: 12px; width: 100%; min-width: max-content; } 
        body.mobile-mode th, body.mobile-mode td { padding: 12px 6px; white-space: nowrap; } 
        body.mobile-mode .sym { font-size: 14px; }
        body.mobile-mode .news-title-cell { max-width: 180px !important; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--green); color:var(--green);" onclick="toggleAudio()">🔊 警報/防睡眠</button>
        <button id="test-audio-btn" class="ghost-btn" style="border-color:var(--purple); color:var(--purple);" onclick="testAudio()">🎵 測試音效</button>
        
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 ETF</button>
        <button class="ghost-btn" style="border-color:var(--neon-green); color:var(--neon-green);" onclick="checkDrafts()">📝 審核 AI 草稿</button>
        
        <div style="display:flex; align-items:center; border:1px solid var(--border); border-radius:6px; padding:2px 5px; margin-right:10px; background:rgba(0,0,0,0.2); flex-shrink: 0;">
            <button style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-weight:bold; padding:0 8px; font-size:14px; outline:none;" onclick="changeZoom(-0.1)">-</button>
            <span id="zoom-label" style="font-size:12px; color:var(--text-main); min-width:40px; text-align:center; font-weight:bold; cursor:default;">100%</span>
            <button style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-weight:bold; padding:0 8px; font-size:14px; outline:none;" onclick="changeZoom(0.1)">+</button>
        </div>

        <button class="ghost-btn" style="border-color:var(--blue); color:var(--blue);" onclick="showAITrends()">🧠 AI 戰果詞庫</button>
        <button id="mode-btn" class="ghost-btn" style="border-color:var(--yellow); color:var(--yellow);" onclick="toggleMode()">📱 切換手機版</button>
        <button class="ghost-btn" onclick="resetLayout()">🔄 重置網格</button>
        <button class="ghost-btn" style="border-color:var(--neon-purple); color:var(--neon-purple);" onclick="exportNewsExcel()">📥 匯出實驗報表</button>
        
        <div style="font-size: 13px; color: var(--text-muted); font-family: monospace; margin-left:10px; flex-shrink: 0;">TPE: <span id="sys-clock" style="color: var(--text-main); font-weight: bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted); padding-left: 15px;">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel">
            <div class="panel-header"><span>🚀 即時動能日誌</span></div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr>
                        <th class="status-indicator"></th><th>時間</th><th>代碼</th>
                        <th>流通股</th><th>價格</th><th>量比</th>
                        <th>加速</th>
                        <th>成交量</th><th>近期動能</th><th>訊號</th>
                    </tr></thead>
                    <tbody id="surge-log-body"><tr><td colspan="10" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-rank" class="window-panel active-tab">
            <div class="panel-header"><span>🏆 超新星排行</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('rank', 'Code')">代碼 <span id="sort-rank-Code"></span></th>
                        <th onclick="setSort('rank', 'Float')">流通股 <span id="sort-rank-Float"></span></th>
                        <th onclick="setSort('rank', 'Price')">價格 <span id="sort-rank-Price"></span></th>
                        <th onclick="setSort('rank', 'RelVol')">量比 <span id="sort-rank-RelVol"></span></th>
                        <th onclick="setSort('rank', 'VolAcc')">加速 <span id="sort-rank-VolAcc"></span></th>
                        <th onclick="setSort('rank', 'Vol')">成交量 <span id="sort-rank-Vol"></span></th>
                        <th onclick="setSort('rank', 'Pct')">漲幅 (金額) <span id="sort-rank-Pct">▼</span></th>
                        <th>近期動能</th>
                    </tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-vwap" class="window-panel">
            <div class="panel-header"><span style="color:var(--neon-green); text-shadow:0 0 5px rgba(57,255,20,0.3);">🚀 VWAP 乖離與動能</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th>代碼</th>
                        <th>VWAP 乖離</th>
                        <th>量比加速度</th>
                        <th>漲幅</th>
                        <th>量比</th>
                        <th>加速</th>
                        <th>訊號</th>
                    </tr></thead>
                    <tbody id="vwap-list"><tr><td colspan="8" style="text-align:center; padding: 20px; color: var(--text-muted);">掃描中...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-news" class="window-panel">
            <div class="panel-header"><span>🗞️ 情報雷達</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('news', 'time')">時間 <span id="sort-news-time"></span></th>
                        <th onclick="setSort('news', 'Code')">代碼 <span id="sort-news-Code"></span></th>
                        <th onclick="setSort('news', 'CatScore')">評分 <span id="sort-news-CatScore">▼</span></th>
                        <th>標題</th>
                        <th onclick="setSort('news', 'Float')">流通股 <span id="sort-news-Float"></span></th>
                        <th onclick="setSort('news', 'Price')">價格 <span id="sort-news-Price"></span></th>
                        <th onclick="setSort('news', 'RelVol')">量比 <span id="sort-news-RelVol"></span></th>
                        <th onclick="setSort('news', 'VolAcc')">加速 <span id="sort-news-VolAcc"></span></th> 
                        <th onclick="setSort('news', 'Vol')">成交量 <span id="sort-news-Vol"></span></th>
                        <th onclick="setSort('news', 'Pct')">漲幅 <span id="sort-news-Pct"></span></th>
                    </tr></thead>
                    <tbody id="news-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與動態風控</div>
            <div class="panel-content" id="detail-list" style="padding: 20px; user-select: text;">
                <div style="text-align:center; color: var(--text-muted); padding: 60px 0;">點擊代碼載入戰報...</div>
            </div>
        </div>
    </div>

    <div id="mobile-tabs">
        <button class="tab-btn active" onclick="switchTab('win-rank', this)">🏆 排行</button>
        <button class="tab-btn" onclick="switchTab('win-vwap', this)">🚀 VWAP</button>
        <button class="tab-btn" onclick="switchTab('win-log', this)">動態</button>
        <button class="tab-btn" onclick="switchTab('win-news', this)">🗞️ 情報</button>
        <button class="tab-btn" onclick="switchTab('win-detail', this)">📊 戰報</button>
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = true, played = {}, showETF = false, lastTopNewsHeadline = ""; 
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };
        let rankCfg = { col: 'Pct', asc: false }, newsCfg = { col: 'CatScore', asc: false };

        let isMobileMode = window.innerWidth <= 768;
        if (isMobileMode) document.body.classList.add('mobile-mode');

        let audioUnlocked = false;
        function initAudioContext() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            sounds.nova.volume = 0.01;
            let playPromise = sounds.nova.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    sounds.nova.pause();
                    sounds.nova.currentTime = 0;
                    sounds.nova.volume = 1.0; 
                }).catch(e => { sounds.nova.volume = 1.0; });
            } else { sounds.nova.volume = 1.0; }
            document.removeEventListener('click', initAudioContext);
            document.removeEventListener('touchstart', initAudioContext);
            requestWakeLock();
        }
        document.addEventListener('click', initAudioContext);
        document.addEventListener('touchstart', initAudioContext);

        function toggleAudio() {
            audioOn = !audioOn;
            let btn = document.getElementById('audio-btn');
            if (audioOn) {
                btn.style.borderColor="var(--green)";
                btn.style.color="var(--green)";
                btn.innerText="🔊 警報/防睡眠";
                initAudioContext();
            } else {
                btn.style.borderColor="var(--red)";
                btn.style.color="var(--red)";
                btn.innerText="🔇 音效 (已靜音)";
            }
        }

        function testAudio() {
            initAudioContext(); 
            sounds.nova.currentTime = 0;
            sounds.nova.volume = 1.0;
            sounds.nova.play().then(() => { alert("✅ 音效測試成功！聲音正常播放。"); }).catch(e => { alert("❌ 音效播放失敗！\n\n您的瀏覽器強制封鎖了音效。請點擊網頁空白處後再測試一次。\n錯誤細節：" + e.message); });
        }

        function checkDrafts() {
            fetch('/api/drafts').then(r => r.json()).then(data => {
                let words = Object.keys(data);
                if (words.length === 0) { alert("🤖 目前沒有新的 AI 學習草稿。\n系統會在每日美東時間 16:30 自動分析當日暴漲股並生成。"); return; }
                let w = words[0]; let info = data[w];
                let msg = `🤖 AI 自動學習系統發現高勝率單字！\n\n📌 關鍵字: ${w}\n📊 歷史最高平均漲幅: +${info.avg_impact_pct}%\n🔍 觸發次數: ${info.count} 次\n📝 備註: ${info.note}\n\n您要將此單字加入實戰詞庫 (trends.json) 嗎？`;
                if (confirm(msg)) { processDraft(w, 'approve'); } else { if(confirm("要將此單字從草稿中刪除嗎？")) { processDraft(w, 'reject'); } }
            });
        }
        function processDraft(word, action) { fetch('/api/approve_draft', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({word: word, action: action}) }).then(() => { checkDrafts(); }); }

        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') { wakeLock = await navigator.wakeLock.request('screen'); }
                    });
                }
            } catch (err) { }
        }

        let currentZoom = parseFloat(localStorage.getItem('sniper_zoom')) || 1.0;
        function applyZoom() { document.body.style.zoom = currentZoom; let zl = document.getElementById('zoom-label'); if(zl) zl.innerText = Math.round(currentZoom * 100) + '%'; }
        function changeZoom(delta) { currentZoom += delta; if(currentZoom < 0.5) currentZoom = 0.5; if(currentZoom > 2.0) currentZoom = 2.0; currentZoom = Math.round(currentZoom * 10) / 10; localStorage.setItem('sniper_zoom', currentZoom); applyZoom(); }

        function toggleMode() {
            isMobileMode = !isMobileMode;
            let btn = document.getElementById('mode-btn');
            if (isMobileMode) { document.body.classList.add('mobile-mode'); btn.innerText = "💻 切換電腦版"; } 
            else { document.body.classList.remove('mobile-mode'); btn.innerText = "📱 切換手機版"; initWindowManager(); }
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.window-panel').forEach(el => el.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active-tab');
            btn.classList.add('active');
        }

        function parseValue(val, col) {
            if (val === undefined || val === null || val === '-') return -999999;
            if (typeof val === 'string' && val.includes('N/A')) return -999999;
            if (col === 'Code' || col === 'time') return val.toString();
            let str = val.toString();
            let num = parseFloat(str.replace(/[^0-9.-]/g, '')) || 0;
            if (col === 'Vol' || col === 'Float') { if (str.includes('M')) return num * 1000000; if (str.includes('K')) return num * 1000; }
            if (col === 'VolAcc' || col === 'RelVol' || col === 'Pct') return parseFloat(str.replace(/[^0-9.-]/g, '')) || 0;
            return num;
        }

        function formatVolAcc(v) {
            if (!v || v === '-' || v.trim() === '') return `<span style="color:var(--text-muted);">-</span>`;
            let color = "var(--text-muted)";
            if (v.includes('🔥') || v.includes('↗')) color = "var(--green)";
            if (v.includes('🩸') || v.includes('🔻') || v.includes('↘')) color = "var(--red)";
            if (v.includes('🧊')) color = "var(--border)";
            return `<span style="color:${color}; font-weight:bold;">${v}</span>`;
        }

        function setSort(table, col) {
            let cfg = table === 'rank' ? rankCfg : newsCfg;
            if (cfg.col === col) cfg.asc = !cfg.asc; else { cfg.col = col; cfg.asc = false; }
            document.querySelectorAll(`[id^="sort-${table}-"]`).forEach(el => el.innerText = "");
            document.getElementById(`sort-${table}-${col}`).innerText = cfg.asc ? "▲" : "▼";
            if (Object.keys(brain).length > 0) refreshUI(brain);
        }

        function showAITrends() {
            if (!brain || !brain.live_trends) return alert("📡 系統尚未載入...");
            let msg = `🔥 V45 戰果加權 NLP 詞庫：\n📅 更新時間：${brain.trends_date || '即時同步'}\n\n`;
            Object.keys(brain.live_trends).forEach(k => { 
                let data = brain.live_trends[k];

        // 💡 輔助函式：根據 TriggerType 和時間戳返回 CSS 閃爍類別
        function getFlashClass(triggerTs, triggerType) {
            if (!triggerTs || triggerType === "none" || !triggerType) return "";
            const now = Date.now() / 1000;
            const diff = now - triggerTs;
            
            if (diff < 5) {
                if (triggerType === "down") return "flash-active-down";
                return "flash-active-up"; // up 和 vol_spike 都用紫色閃爍
            }
            if (diff < 120) {
                if (triggerType === "down") return "flash-settled-down";
                return "flash-settled-up";
            }
            return "";
        }
        
        // 💡 輔助函式：產生動能標籤
        function getDeltaTag(triggerTs, deltaStr, triggerType) {
            if (!deltaStr || !triggerTs || triggerType === "none") return '<span style="color:var(--text-muted);">-</span>';
            const now = Date.now() / 1000;
            if (now - triggerTs > 120) return '<span style="color:var(--text-muted);">-</span>'; // 2分鐘後過期
            
            let color = triggerType === "down" ? "var(--red)" : "var(--neon-purple)";
            return `<span style="color:${color}; font-weight:bold; background:rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 11px;">${deltaStr}</span>`;
        }

        function highlightElites(text, elites, trends) {
            if (!elites || elites.length === 0) return text;
            let res = text;
            elites.forEach(w => {
                let regex = new RegExp(`\\b${w}\\b`, 'gi');
                let exp = trends && trends[w] && trends[w].avg_impact_pct > 15 ? ` <span style="color:#ffa500; font-size:10px;">(🔥+${trends[w].avg_impact_pct}%)</span>` : "";
                res = res.replace(regex, `<span class="neon-word">$&</span>${exp}`);
            });
            return res;
        }

                        <h2 class="sym" style="font-size:28px; margin:0; display:flex; align-items:center;">${sym} <span style="font-size:18px; color:var(--text-muted); margin-left:10px;">${d.Price||'-'}</span></h2>
                        <div style="margin-top:5px; font-size:12px; color:${vsaState > 0 ? 'var(--red)' : 'var(--green)'}; font-weight:bold;">${vsaWarning}</div>
                        <div style="margin-top:5px; font-size:13px; color:var(--text-main);">🛡️ 動態防守線: <b style="color:var(--red);">$${(d.StopLoss||0).toFixed(2)}</b></div>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center;">${gaugeHTML}<button class="ghost-btn" style="padding:4px 10px; font-size:12px; height:fit-content; margin:0;" onclick="openTW('${sym}')">TV ↗</button></div>
                </div>
                
                <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; font-size:12px; border:1px solid rgba(255,255,255,0.05);">
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">成交量<br>${volHTML}</div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">量比<br><b style="color:var(--yellow); font-size:14px;">${d.RelVol||'-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">量能加速<br><b style="font-size:14px;">${formatVolAcc(d.VolAcc)}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center; box-shadow: 0 0 5px rgba(227, 179, 65, 0.2);">量比加速度<br><b style="color:var(--yellow); font-size:14px;">${d.VR_Acc||0}%</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center; grid-column:span 2;">VWAP 乖離率<br><b style="color:${vwapColor}; font-size:14px; ${vwapGlow}">${d.VWAP_Dev>0?'+'+d.VWAP_Dev:d.VWAP_Dev}%</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center; grid-column:span 2;">催化評分<br><b style="color:var(--yellow); font-size:14px;">${d.CatScore||0}</b></div>
                    <div style="grid-column:span 2; padding-left:4px;">籌碼: <b style="color:var(--text-main);">${d.Float||'-'}</b></div>
                    <div style="grid-column:span 2; padding-left:4px;">當前狀態: <b style="color:${d.Signal.includes('洗盤')?'var(--text-muted)':'var(--yellow)'};">${d.Signal||'掃描中...'}</b></div>
                    ${vcpHTML ? `<div style="grid-column:1/-1;">${vcpHTML}</div>` : ''}
                </div>
                <h3 style="color:var(--text-muted); font-size:12px; border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:12px; margin-bottom:8px; text-align:left;">🗞️ 情報物理實驗分析</h3>`;
            
            if (!d.NewsList || d.NewsList.length === 0) html += `<div style="text-align:left; color:var(--text-muted); font-size:13px;">近 3 日無新聞。</div>`;
            else d.NewsList.forEach(n => { 
                let d_title = n.title==="⏳ 翻譯中..."?n.raw_title:n.title; d_title = highlightElites(d_title, n.elites, brain.live_trends);
                
                let p_news = n.p_news || 0; let max_p_15m = n.max_p_15m || 0; let confirm_html = "";
                if (p_news > 0) { if (max_p_15m > p_news) { confirm_html = `<span style="color:var(--neon-green); font-weight:bold; margin-left:10px;">✅ 實體突破發布高點 ($${max_p_15m.toFixed(2)})</span>`; } else { confirm_html = `<span style="color:var(--text-muted); margin-left:10px;">⏳ 尚未突破 ($${p_news.toFixed(2)})</span>`; } }
                
                html += `<div style="margin-bottom:8px; text-align:left; padding:10px; background:rgba(255,255,255,0.02); border-radius:6px; border-left:3px solid ${n.elites && n.elites.length>0?'var(--neon-green)':(n.is_today?'#ffa500':'var(--border)')};">
                    <div style="color:${n.is_today?'#ffa500':'var(--text-muted)'}; font-size:11px; margin-bottom:4px; font-weight:bold;">${n.time} | 權重: ${n.score} ${confirm_html}</div>
                    <a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--text-main); font-size:13px;">${d_title}</a>
                </div>`; 
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }
        
        window.onload = () => { applyZoom(); initWindowManager(); refresh(); };
    </script>
</body>
</html>
