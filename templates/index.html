<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V46 - Chimera Matrix 2.0 (👑 皇冠主力偵蒐版)</title>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --neon-green: #39ff14; --neon-purple: #d292ff; 
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, sans-serif; height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; user-select: none; }
        
        #tactical-bar { height: 50px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; flex-shrink: 0; z-index: 100; overflow-x: auto; white-space: nowrap; }
        #tactical-bar::-webkit-scrollbar { display: none; }
        
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s ease; margin-right: 8px; flex-shrink: 0;}
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); }
        
        #workspace { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 8px; flex: 1; box-sizing: border-box; background: #000; overflow: hidden; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 8px 12px; font-size: 13px; font-weight: bold; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        .panel-content::-webkit-scrollbar { display: none; } 
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-size: 12px; position: sticky; top: 0; z-index: 10; padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; }
        td { padding: 8px; border-bottom: 1px solid rgba(48, 54, 61, 0.3); font-size: 13px; }
        tr { transition: background-color 0.5s ease; }
        tr:hover { background: rgba(255,255,255,0.05); cursor: pointer; }
        
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); } tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-red .status-indicator { background: var(--red); } tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-gray .status-indicator { background: var(--text-muted); }
        
        .new-alert-row { background-color: rgba(88, 166, 255, 0.08) !important; }
        @keyframes sniper-pulse { 0% { color: var(--green); text-shadow: none; } 50% { color: #56d364; text-shadow: 0 0 3px rgba(86,211,100,0.4); } 100% { color: var(--green); text-shadow: none; } }
        .sniper-tag { animation: sniper-pulse 2s infinite; font-weight: 900; }
        @keyframes gold-glow { 0% { box-shadow: 0 0 2px rgba(255, 215, 0, 0.1); border-color: rgba(255, 215, 0, 0.2); } 50% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.3); border-color: rgba(255, 215, 0, 0.5); } 100% { box-shadow: 0 0 2px rgba(255, 215, 0, 0.1); border-color: rgba(255, 215, 0, 0.2); } }
        
        .sym { font-weight: bold; font-size: 15px; }
        .up { color: var(--green); font-weight: bold; } .down { color: var(--red); font-weight: bold; }
        .neon-word { color: var(--neon-green); font-weight: 900; }

        /* 主力標籤特效 */
        .crown-icon { color: #ffd700; font-size: 14px; margin-right: 4px; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        .crown-row { background: rgba(255, 215, 0, 0.04) !important; }
        @keyframes row-pulse { 0% { background: rgba(163, 113, 247, 0.05); } 50% { background: rgba(163, 113, 247, 0.15); } 100% { background: rgba(163, 113, 247, 0.05); } }
        .main-force-row { animation: row-pulse 3s infinite !important; border-left: 2px solid var(--purple) !important; }
        .badge { font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: bold; margin-right: 3px; display: inline-block; }
        .badge-hot { background: var(--red); color: white; }
        .badge-news { background: var(--blue); color: white; }
        .badge-light { background: var(--green); color: black; }

        #mobile-tabs { display: none; }
        body.mobile-mode { overflow-y: auto !important; overflow-x: hidden !important; height: auto; padding-bottom: 60px; }
        body.mobile-mode #tactical-bar { overflow-x: auto; white-space: nowrap; padding-right: 20px; }
        body.mobile-mode #mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-surface); z-index: 10000; border-top: 1px solid var(--border); }
        body.mobile-mode .tab-btn { flex: 1; padding: 15px 0; background: transparent; border: none; color: var(--text-muted); font-weight: bold; font-size: 13px; cursor: pointer; }
        body.mobile-mode .tab-btn.active { color: var(--blue); border-top: 2px solid var(--blue); background: rgba(88, 166, 255, 0.05); }
        body.mobile-mode #workspace { display: block; overflow: hidden; height: auto; padding: 5px; width: 100vw; box-sizing: border-box; }
        body.mobile-mode .window-panel { position: static !important; width: 100% !important; height: auto !important; min-height: 85vh; margin-bottom: 15px; display: none; border-radius: 0; border: none; }
        body.mobile-mode .window-panel.active-tab { display: flex !important; }
        body.mobile-mode table { font-size: 12px; min-width: max-content; }
    </style>
</head>
<body id="main-body">
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--green); color:var(--green);" onclick="toggleAudio()">🔊 核心警報</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 ETF</button>
        <button id="summary-btn" class="ghost-btn" style="border-color:var(--neon-green); color:var(--neon-green);" onclick="fetchSummary()">📊 高勝率戰報</button>
        
        <div style="display:flex; align-items:center; border:1px solid var(--border); border-radius:6px; padding:2px 5px; margin-right:10px; background:rgba(0,0,0,0.2); flex-shrink: 0;">
            <button class="ghost-btn" style="margin:0; border:none; padding:0 8px; font-size:14px; outline:none;" onclick="changeZoom(-0.1)">-</button>
            <span id="zoom-label" style="font-size:12px; color:var(--text-main); min-width:40px; text-align:center; font-weight:bold; cursor:default;">100%</span>
            <button class="ghost-btn" style="margin:0; border:none; padding:0 8px; font-size:14px; outline:none;" onclick="changeZoom(0.1)">+</button>
        </div>

        <button id="mode-btn" class="ghost-btn" style="border-color:var(--yellow); color:var(--yellow);" onclick="toggleMode()">📱 切換手機版</button>
        <button class="ghost-btn" style="border-color:var(--neon-purple); color:var(--neon-purple);" onclick="exportIntelligence()">📥 匯出</button>
        <button class="ghost-btn" onclick="resetLayout()">🔄 重設畫面</button>
        
        <div style="font-size: 13px; color: var(--text-muted); font-family: monospace; margin-left:10px; flex-shrink: 0;">TPE: <span id="sys-clock" style="color: var(--text-main); font-weight: bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted); padding-left: 15px;">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel">
            <div class="panel-header">🚀 即時動能日誌 (Max 1000)</div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr>
                        <th class="status-indicator"></th><th>時間</th><th>代碼</th><th>股價</th><th>量比</th>
                        <th>流通股</th><th>成交量</th><th>秒速 (V)</th><th>續航 (5m)</th><th>漲幅</th><th>戰術訊號</th>
                    </tr></thead>
                    <tbody id="surge-log-body"><tr><td colspan="11" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與風控</div>
            <div id="detail-list" class="panel-content" style="padding: 12px;">
                <div style="text-align:center; color: var(--text-muted); padding: 60px 0;">點擊代碼載入濃縮戰報...</div>
            </div>
        </div>

        <div id="win-rank" class="window-panel">
            <div class="panel-header">🏆 超新星排行 (👑 代表主力在場)</div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('rank', 'Code')">代碼 <span id="sort-rank-Code"></span></th>
                        <th>屬性標籤</th>
                        <th onclick="setSort('rank', 'RelVol')">量比 <span id="sort-rank-RelVol"></span></th>
                        <th onclick="setSort('rank', 'Float')">流通股 <span id="sort-rank-Float"></span></th>
                        <th onclick="setSort('rank', 'Vol')">成交量 <span id="sort-rank-Vol"></span></th>
                        <th onclick="setSort('rank', 'Pct')">漲幅 <span id="sort-rank-Pct">▼</span></th>
                    </tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-news" class="window-panel">
            <div class="panel-header">🗞️ 情報雷達 (過濾雜訊版)</div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('news', 'time')">時間 <span id="sort-news-time"></span></th>
                        <th onclick="setSort('news', 'Code')">代碼 <span id="sort-news-Code"></span></th>
                        <th onclick="setSort('news', 'CatScore')">評分 <span id="sort-news-CatScore">▼</span></th>
                        <th>情報摘要</th>
                    </tr></thead>
                    <tbody id="news-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="mobile-tabs">
        <button class="tab-btn active" onclick="switchTab('win-rank', this)">🏆 排行</button>
        <button class="tab-btn" onclick="switchTab('win-log', this)">動態</button>
        <button class="tab-btn" onclick="switchTab('win-news', this)">🗞️ 情報</button>
        <button class="tab-btn" onclick="switchTab('win-detail', this)">📊 戰報</button>
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = true, played = {}, showETF = false;
        const sounds = { nova: new Audio('/static/sounds/nova.mp3') };
        let rankCfg = { col: 'Pct', asc: false }, newsCfg = { col: 'CatScore', asc: false };
        let isMobileMode = window.innerWidth <= 768;
        if (isMobileMode) document.body.classList.add('mobile-mode');

        let alertRenderCount = {};
        let currentZoom = parseFloat(localStorage.getItem('sniper_zoom')) || 1.0;
        
        // 🛡️ 防當機：縮放鎖定
        if (currentZoom < 0.5) currentZoom = 0.5;
        if (currentZoom > 2.0) currentZoom = 2.0;

        function applyZoom() { 
            document.getElementById('main-body').style.zoom = currentZoom; 
            document.getElementById('zoom-label').innerText = Math.round(currentZoom * 100) + '%';
        }
        function changeZoom(delta) { 
            currentZoom += delta; 
            if(currentZoom < 0.5) currentZoom = 0.5; 
            if(currentZoom > 2.0) currentZoom = 2.0; 
            currentZoom = Math.round(currentZoom * 10) / 10; 
            localStorage.setItem('sniper_zoom', currentZoom); 
            applyZoom(); 
        }

        let audioUnlocked = false;
        function initAudioContext() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            sounds.nova.volume = 0.01;
            let playPromise = sounds.nova.play();
            if (playPromise !== undefined) {
                playPromise.then(() => { sounds.nova.pause(); sounds.nova.currentTime = 0; sounds.nova.volume = 1.0; }).catch(e => { sounds.nova.volume = 1.0; });
            } else { sounds.nova.volume = 1.0; }
            document.removeEventListener('click', initAudioContext);
            document.removeEventListener('touchstart', initAudioContext);
        }
        document.addEventListener('click', initAudioContext);
        document.addEventListener('touchstart', initAudioContext);
        function toggleAudio() {
            audioOn = !audioOn;
            let btn = document.getElementById('audio-btn');
            if (audioOn) { btn.style.borderColor="var(--green)"; btn.style.color="var(--green)"; btn.innerText="🔊 核心警報"; initAudioContext(); } 
            else { btn.style.borderColor="var(--red)"; btn.style.color="var(--red)"; btn.innerText="🔇 音效 (已靜音)"; }
        }

        function toggleMode() { isMobileMode = !isMobileMode; let btn = document.getElementById('mode-btn'); if (isMobileMode) { document.body.classList.add('mobile-mode'); btn.innerText = "💻 切換電腦版"; switchTab('win-rank', document.querySelectorAll('.tab-btn')[0]); } else { document.body.classList.remove('mobile-mode'); btn.innerText = "📱 切換手機版"; document.querySelectorAll('.window-panel').forEach(el => el.classList.remove('active-tab')); } }
        function switchTab(tabId, btn) { document.querySelectorAll('.window-panel').forEach(el => el.classList.remove('active-tab')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tabId).classList.add('active-tab'); btn.classList.add('active'); }
        function toggleETF() { showETF = !showETF; let btn = document.getElementById('etf-btn'); if (showETF) { btn.innerText = "🔘 隱藏 ETF"; btn.style.borderColor = "var(--red)"; btn.style.color = "var(--red)"; } else { btn.innerText = "🔘 ETF"; btn.style.borderColor = "var(--border)"; btn.style.color = "var(--text-main)"; } if (Object.keys(brain).length > 0) refreshUI(brain); }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        function parseValue(val, col) {
            if (val === undefined || val === null || val === '-') return -999999;
            if (typeof val === 'string' && val.includes('N/A')) return -999999;
            if (col === 'Code' || col === 'time') return val.toString();
            let str = val.toString(); let num = parseFloat(str.replace(/[^0-9.-]/g, '')) || 0;
            if (col === 'Float' || col === 'Vol') { if (str.includes('M')) return num * 1000000; if (str.includes('K')) return num * 1000; }
            if (col === 'RelVol' || col === 'Pct' || col === 'VolAcc') return parseFloat(str.replace(/[^0-9.-]/g, '')) || 0;
            return num;
        }

        function setSort(table, col) {
            let cfg = table === 'rank' ? rankCfg : newsCfg;
            if (cfg.col === col) cfg.asc = !cfg.asc; else { cfg.col = col; cfg.asc = false; }
            document.querySelectorAll(`[id^="sort-${table}-"]`).forEach(el => el.innerText = "");
            document.getElementById(`sort-${table}-${col}`).innerText = cfg.asc ? "▲" : "▼";
            if (Object.keys(brain).length > 0) refreshUI(brain);
        }

        function formatVolAcc(v) {
            if (!v || v === '-' || v.trim() === '') return `<span style="color:var(--text-muted);">-</span>`;
            let color = "var(--text-muted)";
            if (v.includes('🔥') || v.includes('↗')) color = "var(--green)";
            if (v.includes('🩸') || v.includes('🔻') || v.includes('↘')) color = "var(--red)";
            if (v.includes('🧊')) color = "var(--border)";
            return `<span style="color:${color}; font-weight:bold;">${v}</span>`;
        }

        function highlightElites(text, elites, trends) {
            if (!text) return text;
            let res = text.replace(/\[Echo\] /g, `<span style="color:var(--blue); border:1px solid rgba(88,166,255,0.3); padding:1px 4px; border-radius:3px; font-size:10px; margin-right:4px;">🔔 發酵</span>`);
            if (!elites || elites.length === 0) return res;
            elites.forEach(w => { let regex = new RegExp(`\\b${w}\\b`, 'gi'); res = res.replace(regex, `<span class="neon-word">$&</span>`); });
            return res;
        }

        function refresh() { fetch('/data?t=' + Date.now()).then(r => r.json()).then(d => { brain = d; refreshUI(d); setTimeout(refresh, 5000); }).catch(e => { document.getElementById('sys-status').innerText = "⚠️ 網路閃斷，重連中..."; document.getElementById('sys-status').style.color = "var(--red)"; setTimeout(refresh, 5000); }); }

        function refreshUI(d) {
            if (!d) return;
            document.getElementById('sys-status').innerText = `📡 數據更新: ${d.last_update || '--:--:--'}`;
            document.getElementById('sys-status').style.color = "var(--green)";
            
            // 建立情報評分快取
            let newsScoreMap = {};
            (d.top_catalysts || []).forEach(n => { newsScoreMap[n.Code || n.ticker || n.symbol] = n.CatScore || n.score || 0; });

            let currentSigIds = new Set();
            
            // 1. 日誌渲染 (秒速防缺保護)
            let h1 = "";
            (d.surge_log || []).forEach(r => {
                if (r.Type === 'fund' && !showETF) return; 
                let f_Code = r.Code || r.ticker || "N/A";
                let sigId = f_Code + "_" + r.SignalTS;
                currentSigIds.add(sigId);
                alertRenderCount[sigId] = (alertRenderCount[sigId] || 0) + 1;
                let isNew = alertRenderCount[sigId] <= 5;
                let rowClass = r.Status ? `tr-${r.Status}` : ""; if (isNew) rowClass += " new-alert-row";
                let sig = r.Signal || '-';
                
                let velMatch = sig.match(/⚡極速拉升\((.*?)\)/);
                let velVal = velMatch ? velMatch[1] : (r.V || r.Velocity || '-');
                let velStr = velVal !== '-' ? `<b style="color:var(--neon-purple);">${velVal}</b>` : `<span style="color:var(--text-muted);">-</span>`;
                
                sig = sig.replace(/⚡極速拉升\(.*?\)\s*/, '');
                if (sig.includes('🎯')) sig = `<span class="sniper-tag">${sig}</span>`;

                h1 += `<tr class="${rowClass}" onclick="loadDetail('${f_Code}')" ondblclick="openTW('${f_Code}')">
                    <td class="status-indicator"></td>
                    <td style="color:var(--text-muted);">${r.Time}</td>
                    <td class="sym">${f_Code}</td>
                    <td>${r.Price}</td>
                    <td><b style="color:var(--yellow);">${r.RelVol}</b></td>
                    <td>${r.Type==='fund'?'N/A':(r.Float||'-')}</td>
                    <td>${r.Vol||'-'}</td>
                    <td>${velStr}</td>
                    <td>${formatVolAcc(r.VolAcc)}</td>
                    <td class="${parseFloat(r.Pct||0)>0?'up':'down'}">${r.Pct||'-'}</td>
                    <td style="font-weight:bold;">${sig}</td>
                </tr>`;
                if (r.Audio && r.SignalTS > (played[r.SignalTS] || 0) && audioOn) { played[r.SignalTS] = r.SignalTS; sounds.nova.play().catch(e=>{}); }
            });
            document.getElementById('surge-log-body').innerHTML = h1 || `<tr><td colspan="11" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr>`;

            for (let key in alertRenderCount) { if (!currentSigIds.has(key)) delete alertRenderCount[key]; }

            // 2. 超新星排行 (👑 主力與屬性標籤)
            let h2 = "", rankData = [...(d.leaderboard || [])].filter(r => !(r?.Type === 'fund' && !showETF));
            rankData.sort((a, b) => {
                let vA = parseValue((rankCfg.col==='Float'?a.Float:(rankCfg.col==='RelVol'?a.RelVol:a[rankCfg.col])), rankCfg.col);
                let vB = parseValue((rankCfg.col==='Float'?b.Float:(rankCfg.col==='RelVol'?b.RelVol:b[rankCfg.col])), rankCfg.col);
                return (vA < vB) ? (rankCfg.asc ? -1 : 1) : (vA > vB ? (rankCfg.asc ? 1 : -1) : 0);
            });
            rankData.forEach(r => {
                let f_Code = r.Code || r.ticker || "N/A";
                let newsScore = newsScoreMap[f_Code] || 0;
                let floatVal = parseFloat(r.Float) || 0;
                let relVolVal = parseFloat(r.RelVol) || 0;

                // 👑 主力在場判定
                let isMainForce = (relVolVal > 3.0 && newsScore > 70); 
                let crown = isMainForce ? `<span class="crown-icon crown-active">👑</span>` : "";
                let rowClass = isMainForce ? "main-force-row" : "";
                
                // 屬性標籤
                let badges = "";
                if (relVolVal > 5.0) badges += `<span class="badge badge-hot">☢️ 爆量</span>`;
                if (newsScore > 70) badges += `<span class="badge badge-news">🗞️ 利多</span>`;
                if (floatVal > 0 && floatVal <= 15) badges += `<span class="badge badge-light">🐎 輕盤</span>`;

                h2 += `<tr class="${rowClass}" onclick="loadDetail('${f_Code}')" ondblclick="openTW('${f_Code}')">
                    <td class="status-indicator"></td>
                    <td class="sym">${crown}${f_Code}</td>
                    <td>${badges || '<span style="color:var(--border)">-</span>'}</td>
                    <td><b style="color:var(--yellow);">${r.RelVol||'-'}</b></td>
                    <td>${r.Type==='fund'?'N/A':(r.Float||"-")}</td>
                    <td>${r.Vol||'-'}</td>
                    <td class="${parseFloat(r.Pct||0)>0?'up':'down'}">${r.Pct||'-'}</td>
                </tr>`;
            });
            document.getElementById('rank-list').innerHTML = h2;

            // 3. 情報渲染 (過濾雜訊代碼 N/A)
            let h3 = "", newsData = [...(d.top_catalysts || [])].filter(n => {
                let code = n.Code || n.ticker || n.symbol;
                let isValid = code && code !== "undefined" && code !== "null" && code !== "N/A";
                return isValid && !(n?.Type === 'fund' && !showETF) && n?.NewsList && n.NewsList.length > 0;
            });
            newsData.sort((a, b) => {
                let vA = parseValue((newsCfg.col==='time'?a.NewsList[0]?.time:(newsCfg.col==='CatScore'?(a.CatScore!==undefined?a.CatScore:a.score):a[newsCfg.col])), newsCfg.col);
                let vB = parseValue((newsCfg.col==='time'?b.NewsList[0]?.time:(newsCfg.col==='CatScore'?(b.CatScore!==undefined?b.CatScore:b.score):b[newsCfg.col])), newsCfg.col);
                return (vA < vB) ? (newsCfg.asc ? -1 : 1) : (vA > vB ? (newsCfg.asc ? 1 : -1) : 0);
            });
            newsData.forEach(n => {
                let latest = n.NewsList[0]; 
                let f_Score = n.CatScore !== undefined ? n.CatScore : (n.score || 0);
                let f_Code = n.Code || n.ticker || n.symbol;
                let hl_text = highlightElites(latest.title==="⏳ 翻譯中..."?latest.raw_title:latest.title, latest.elites, d.live_trends);
                h3 += `<tr onclick="loadDetail('${f_Code}'); if(isMobileMode) switchTab('win-detail', document.querySelectorAll('.tab-btn')[3]);" ondblclick="openTW('${f_Code}')">
                    <td class="status-indicator" style="background:${f_Score >= 6 ? 'var(--yellow)' : 'var(--border)'};"></td>
                    <td style="color:${latest.is_today?'#ffa500':'var(--text-muted)'}; font-size:11px;">${latest.time}</td>
                    <td class="sym">${f_Code}</td><td style="font-weight:bold; color:${f_Score>=6?'var(--yellow)':'var(--text-muted)'};">${f_Score}</td>
                    <td style="font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:250px;">${hl_text}</td>
                </tr>`;
            });
            document.getElementById('news-list').innerHTML = h3;
            if(activeSym) loadDetail(activeSym);
        }

        function loadDetail(sym) {
            if (sym === "N/A" || !sym) return; 
            activeSym = sym;
            let d = (brain.details && brain.details[sym]) ? brain.details[sym] : null; 
            let rankData = brain.leaderboard ? brain.leaderboard.find(x => (x.Code||x.ticker) === sym) : null;
            if (!d && !rankData) return;
            if (!d && rankData) d = { Price:rankData.Price, Pct:rankData.Pct, Vol:rankData.Vol, RelVol:"-", Float:rankData.Type==='fund'?"N/A(ETF)":(rankData.Float||"-"), StopLoss:0, CatScore:0, IsTrap:false, NewsList:[], VolAcc:"-", Is100K:false, SN_Score:0, VsaState:0, VR_Acc:0, VWAP_Dev:0, VWAP_Rating:"Low", HasSentimentFlip:false };
            
            let trapWarn = d.IsTrap ? `<div style="border:1px solid var(--red); color:var(--red); padding:4px; margin-bottom:5px; border-radius:4px; font-size:12px; font-weight:bold;">🩸 偵測到毒藥/退市風險</div>` : "";
            if (d.HasSentimentFlip) trapWarn = `<div style="border:1px solid rgba(255,215,0,0.6); background: rgba(255,215,0,0.05); color:#ffd700; padding:4px; margin-bottom:5px; border-radius:4px; font-size:12px; font-weight:bold; animation: gold-glow 2s infinite;">💎 戰術警報：利空不跌！主力強勢承接</div>` + trapWarn;
            let snScore = d.SN_Score || 0; let vsaState = d.VsaState || 0; let snColor = snScore >= 400 ? "var(--neon-green)" : (snScore >= 200 ? "var(--yellow)" : "var(--text-muted)");
            if (vsaState > 0) snColor = "var(--red)";
            let vwapColor = d.VWAP_Rating === 'High' ? 'var(--red)' : (d.VWAP_Rating === 'Mid' ? 'var(--yellow)' : 'var(--neon-green)');
            let sig = (d.Signal || '掃描中...').replace(/⚡極速拉升\(.*?\)\s*/, '');
            if (sig.includes('🎯')) sig = `<span class="sniper-tag">${sig}</span>`;
            let gaugeHTML = `<svg width="70" height="40" viewBox="0 0 120 70" style="overflow:visible;"><path d="M 15 60 A 45 45 0 0 1 105 60" fill="none" stroke="var(--border)" stroke-width="12" stroke-linecap="round" /><path d="M 15 60 A 45 45 0 0 1 105 60" fill="none" stroke="${snColor}" stroke-width="12" stroke-linecap="round" stroke-dasharray="141" stroke-dashoffset="${141*(1-Math.min(snScore/600,1))}" style="transition: stroke-dashoffset 1s ease-out;" /><text x="60" y="55" text-anchor="middle" fill="${snColor}" font-size="28" font-weight="900">${snScore}</text></svg>`;
            
            let html = `<div style="text-align:left;">${trapWarn}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;">
                    <div style="flex:1;"><h2 style="font-size:24px; margin:0; display:inline-block; cursor:pointer;" onclick="openTW('${sym}')">${sym} <span style="font-size:12px; text-decoration:underline; color:var(--blue); font-weight:normal;">[TV圖表]</span></h2><span style="font-size:18px; color:var(--text-muted); margin-left:8px;">${d.Price||'-'}</span><div style="margin-top:2px; font-size:12px;"><span style="color:${vsaState > 0 ? 'var(--red)' : 'var(--green)'}; font-weight:bold;">${vsaState > 0 ? '🚨量價背離' : '✅量價健康'}</span><span style="margin-left:8px; color:var(--text-main);">🛡️守線: <b style="color:var(--red);">$${(d.StopLoss||0).toFixed(2)}</b></span></div></div><div style="margin-right: -10px;">${gaugeHTML}</div>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:4px; padding:6px; background:rgba(0,0,0,0.3); border-radius:6px; font-size:12px; margin-bottom:8px;"><div style="background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:4px;">Vol: <b>${d.Vol||'-'}</b></div><div style="background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:4px;">Rel: <b style="color:var(--yellow);">${d.RelVol||'-'}</b></div><div style="background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:4px;">Acc(5m): ${formatVolAcc(d.VolAcc)}</div><div style="background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:4px;">VWAP: <b style="color:${vwapColor};">${d.VWAP_Dev>0?'+'+d.VWAP_Dev:d.VWAP_Dev}%</b></div><div style="background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:4px;">Cat: <b style="color:var(--yellow);">${d.CatScore||0}</b></div><div style="background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:4px;">Float: <b>${d.Float||'-'}</b></div><div style="background:rgba(163, 113, 247, 0.1); padding:3px 8px; border-radius:4px; flex:1; text-align:center;">狀態: <b>${sig}</b></div></div>
                <h3 style="color:var(--text-muted); font-size:11px; border-bottom:1px solid var(--border); padding-bottom:3px; margin-top:5px; margin-bottom:5px;">🗞️ 情報分析 (近3日)</h3>`;
            if (!d.NewsList || d.NewsList.length === 0) html += `<div style="font-size:12px; color:var(--text-muted);">無新聞。</div>`;
            else d.NewsList.forEach(n => { 
                let t = highlightElites(n.title==="⏳ 翻譯中..."?n.raw_title:n.title, n.elites, brain.live_trends); 
                html += `<div style="margin-bottom:3px; padding:4px 6px; background:rgba(255,255,255,0.01); border-radius:4px; border-left:2px solid ${n.is_today?'#ffa500':'var(--border)'}; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                    <span style="color:${n.is_today ? '#ffa500' : 'var(--text-muted)'}; font-size:10px; margin-right:5px;">${n.time}</span>
                    <a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--text-main);">${t}</a></div>`; 
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }

        function fetchSummary() { fetch('/api/intelligence_summary').then(r=>r.json()).then(res=>{ if(res.status==="success"){ let msg="🏆 前 50 大高勝率戰場詞彙報表：\n\n"; res.data.forEach((i,idx)=>{ msg+=`${idx+1}. 【 ${i.phrase} 】\n   勝率: ${i.win_rate}% | 平均漲幅: +${i.avg_gain_pct}% | 觸發次數: ${i.occurrences}\n\n`;}); alert(msg); }else{alert("運算失敗");} }).catch(e=>alert("網路錯誤")); }
        function exportIntelligence() { window.location.href='/api/export_intelligence'; }
        function resetLayout() { localStorage.removeItem('sniper_zoom'); location.reload(); }

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false}); }, 1000);
        window.onload = () => { applyZoom(); refresh(); if(isMobileMode) switchTab('win-rank', document.querySelectorAll('.tab-btn')[0]); };
    </script>
</body>
</html>
