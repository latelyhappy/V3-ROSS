<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Sniper V19.9 - Tactical Command</title>
    <style>
        body { margin: 0; background: #050811; color: #c9d1d9; font-family: sans-serif; overflow: hidden; }
        .window { position: absolute; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .title-bar { background: #0d1f3d !important; color: #ffffff !important; padding: 6px 10px; font-size: 11px; font-weight: bold; }
        .content { flex: 1; padding: 4px; overflow-y: auto; font-size: 10.5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #21262d; padding: 4px; text-align: left; }
        tr:hover { background-color: #161b22; cursor: pointer; }
        .sym-link { font-weight: bold; font-size: 12px; color: #58a6ff; text-decoration: none; }
        .sym-link:hover { text-decoration: underline; }
        
        #tactical-bar { position: fixed; top: 0; left: 0; width: 100%; background: #0d1f3d; padding: 8px 20px; box-sizing: border-box; display: flex; gap: 20px; align-items: center; z-index: 9999; border-bottom: 1px solid #30363d; }
        .t-input { background: #050811; border: 1px solid #58a6ff; color: #c9d1d9; padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 80px; text-align: right; }
        
        #audio-btn { background: #f85149; color: white; border: none; padding: 5px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #audio-btn.active { background: #3fb950; }
        
        .news-item { margin-bottom: 12px; border-bottom: 1px solid #21262d; padding-bottom: 5px; }
        .news-today { color: #ffa500 !important; font-weight: bold; }
        .news-time { font-size: 10px; color: #8b949e; margin-right: 5px; }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" onclick="unlockAudio()">🔇 點擊啟用音效</button>
        <div><label>💰 總資金 ($):</label> <input type="number" id="inp-acc" class="t-input" onchange="saveSettings()"></div>
        <div><label>⚠️ 風險 (%):</label> <input type="number" id="inp-risk" class="t-input" step="0.1" onchange="saveSettings()"></div>
    </div>

    <div class="window" style="top:50px; left:10px; width:550px; height:500px; border: 1px solid #6e40c9;">
        <div class="title-bar">🚀 實彈狙擊清單 (量比/動能監控)</div>
        <div class="content" id="surge-list"></div>
    </div>
    
    <div class="window" style="top:50px; left:570px; width:500px; height:650px;">
        <div class="title-bar">📊 戰術詳情與繁體新聞</div>
        <div class="content" id="detail-list">請選擇標的...</div>
    </div>

    <script>
        let brainDetailsCache = {}, activeSymbol = "", audioEnabled = false, playedAudioTS = {};
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };

        // 💾 儲存與讀取設定
        function saveSettings() {
            localStorage.setItem('acc', document.getElementById('inp-acc').value);
            localStorage.setItem('risk', document.getElementById('inp-risk').value);
            if(activeSymbol) loadDetail(activeSymbol);
        }
        function loadSettings() {
            document.getElementById('inp-acc').value = localStorage.getItem('acc') || 20000;
            document.getElementById('inp-risk').value = localStorage.getItem('risk') || 1.0;
        }

        function unlockAudio() {
            audioEnabled = true;
            document.getElementById('audio-btn').innerText = "🔊 音效已解鎖";
            document.getElementById('audio-btn').classList.add("active");
            sounds.spark.play().then(()=>sounds.spark.pause());
        }

        function refresh() {
            fetch('/data?t=' + Date.now()).then(r => r.json()).then(d => {
                brainDetailsCache = d.details || {};
                let html = `<table><thead><tr><th>代碼(點擊圖表)</th><th>價格</th><th>訊號</th><th>量比</th></tr></thead><tbody>`;
                (d.surge || []).forEach(row => {
                    let style = row.Streak ? 'style="background: rgba(255, 234, 0, 0.1);"' : '';
                    html += `<tr ${style} onclick="loadDetail('${row.Code}')">
                        <td><a href="https://www.tradingview.com/chart/?symbol=${row.Code}" target="_blank" class="sym-link">${row.Code}</a></td>
                        <td>${row.Price}</td>
                        <td style="color:#f2cc60; font-weight:bold;">${row.Streak}</td>
                        <td style="color:#3fb950;">${row.RelVol}x</td>
                    </tr>`;
                    if (row.AudioTrigger && row.SignalTS > (playedAudioTS[row.Code] || 0)) {
                        playedAudioTS[row.Code] = row.SignalTS;
                        if (audioEnabled) { sounds[row.AudioTrigger].currentTime = 0; sounds[row.AudioTrigger].play(); }
                    }
                });
                document.getElementById('surge-list').innerHTML = html + `</tbody></table>`;
                if(activeSymbol) loadDetail(activeSymbol);
                setTimeout(refresh, 4000);
            });
        }

        function loadDetail(sym) {
            activeSymbol = sym; const d = brainDetailsCache[sym]; if(!d) return;
            let acc = parseFloat(document.getElementById('inp-acc').value);
            let risk = parseFloat(document.getElementById('inp-risk').value);
            let shares = Math.floor((acc * (risk/100)) / (d.PriceVal - d.StopLossVal));
            
            let html = `
                <div style="text-align:center; padding:10px;">
                    <h2 style="margin:0; color:#58a6ff;">${sym} <span style="color:#3fb950;">${d.PriceStr}</span></h2>
                    <div style="display:flex; justify-content:space-around; background:#161b22; padding:8px; margin-top:10px; border-radius:4px;">
                        <div>量比: <b>${d.RelVol}x</b></div>
                        <div>今日成交: <b>${d.Volume}</b></div>
                        <div>浮動股: <b>${d.FloatStr}</b></div>
                    </div>
                </div>
            `;
            if (d.Signal) {
                html += `
                <div style="background:rgba(255,234,0,0.15); border:1px solid #ffea00; padding:12px; margin:10px 0; border-radius:4px; text-align:center;">
                    <div style="color:#ffea00; font-size:18px; font-weight:bold;">🎯 建議買進: ${shares} 股</div>
                    <div style="font-size:12px; margin-top:5px;">止損位: $${d.StopLossVal.toFixed(2)}</div>
                </div>`;
            }
            html += `<div style="padding:10px;"><h3 style="border-left:4px solid #58a6ff; padding-left:10px;">🗞️ 繁體即時戰報</h3>`;
            (d.NewsList || []).forEach(n => {
                let todayClass = n.is_today ? 'news-today' : '';
                html += `
                <div class="news-item">
                    <span class="news-time">${n.time}</span>
                    <a href="${n.link}" target="_blank" class="${todayClass}" style="text-decoration:none;">${n.title}</a>
                </div>`;
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }
        window.onload = () => { loadSettings(); refresh(); };
    </script>
</body>
</html>
