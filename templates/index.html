<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper V41.12 - Steel Wall Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff; --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e; }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: sans-serif; overflow: auto; padding-top: 50px; user-select: none; }
        #tactical-bar { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(13,17,23,0.95); border-bottom: 1px solid var(--border); z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 10px; }
        #workspace { position: relative; width: 100vw; min-height: 120vh; padding: 10px; box-sizing: border-box; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: absolute; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 10px 15px; font-size: 13px; font-weight: bold; cursor: move; display: flex; justify-content: space-between; }
        .panel-content { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-size: 12px; position: sticky; top: 0; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 13px; }
        .sym { font-weight: bold; color: #fff; }
        .up { color: var(--green); } .down { color: var(--red); }
        .status-indicator { width: 4px; padding: 0 !important; }
        .trap-row { animation: blood-pulse 1.5s infinite; }
        @keyframes blood-pulse { 0%, 100% {background: transparent;} 50% {background: rgba(248,81,73,0.1);} }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="color:var(--red);" onclick="unlockAudio()">🔇 啟用音效</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 顯示 ETF</button>
        <div style="font-size:13px; color:var(--text-muted);">TPE: <span id="sys-clock" style="color:#fff;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px;">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel" style="width:700px; height:400px; transform: translate(10px,10px);">
            <div class="panel-header">🚀 即時動能日誌</div>
            <div class="panel-content"><table><thead><tr><th></th><th>時間</th><th>代碼</th><th>流通股</th><th>價格</th><th>量比</th><th>漲幅</th><th>訊號</th></tr></thead><tbody id="surge-log-body"></tbody></table></div>
        </div>
        <div id="win-rank" class="window-panel" style="width:700px; height:400px; transform: translate(10px,420px);">
            <div class="panel-header">🏆 排行榜</div>
            <div class="panel-content"><table><thead><tr><th></th><th>代碼</th><th>價格</th><th>量比</th><th>成交量</th><th>漲幅</th></tr></thead><tbody id="rank-list"></tbody></table></div>
        </div>
        <div id="win-news" class="window-panel" style="width:600px; height:400px; transform: translate(720px,420px);">
            <div class="panel-header">🗞️ 新聞雷達</div>
            <div class="panel-content"><table><thead><tr><th></th><th>時間</th><th>代碼</th><th>評分</th><th>標題</th><th>漲幅</th></tr></thead><tbody id="news-list"></tbody></table></div>
        </div>
        <div id="win-detail" class="window-panel" style="width:600px; height:400px; transform: translate(720px,10px);">
            <div class="panel-header">📊 深度戰報 (V41.10 HUD)</div>
            <div class="panel-content" id="detail-list" style="padding:15px;"></div>
        </div>
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = false, showETF = false;
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };

        function toggleETF() { showETF = !showETF; refreshUI(brain); }
        function unlockAudio() { audioOn = true; document.getElementById('audio-btn').innerText = "🔊 音效已開啟"; }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        function refreshUI(d) {
            if (!d?.details) return; // 🛡️ Optional Chaining 防崩潰
            document.getElementById('sys-status').innerText = `📡 數據更新: ${d?.last_update || '--'}`;

            // 1. 日誌
            let h1 = "";
            (d?.surge_log || []).forEach(r => {
                if (r?.Type === 'fund' && !showETF) return;
                let det = d.details[r?.Code] || {};
                let icon = det?.IsTrap ? " 💀" : (det?.CatScore > 8 ? " 🔥📰" : (det?.HasNews ? " 📰" : ""));
                h1 += `<tr class="${det?.IsTrap?'trap-row':''}" onclick="loadDetail('${r?.Code}')">
                    <td class="status-indicator" style="background:${det?.IsTrap?'var(--red)':'var(--green)'}"></td>
                    <td>${r?.Time}</td><td class="sym">${r?.Code}${icon}</td><td>${r?.Float}</td><td>${r?.Price}</td><td>${r?.RelVol}</td>
                    <td class="${parseFloat(r?.Pct)>0?'up':'down'}">${r?.Pct}</td><td>${r?.Signal}</td>
                </tr>`;
            });
            document.getElementById('surge-log-body').innerHTML = h1;

            // 3. 新聞 (HUD 排版連動)
            let h3 = "";
            (d?.top_catalysts || []).forEach(n => {
                let latest = n?.NewsList?.[0] || {};
                h3 += `<tr onclick="loadDetail('${n?.Code}')">
                    <td class="status-indicator" style="background:${n?.CatScore>=6?'var(--yellow)':'var(--border)'}"></td>
                    <td style="font-size:11px;">${latest?.time?.split(' ')[1] || '-'}</td>
                    <td class="sym">${n?.Code}</td><td>${n?.CatScore}</td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${latest?.title || '-'}</td>
                    <td class="${parseFloat(n?.Pct)>0?'up':'down'}">${n?.Pct || '-'}</td>
                </tr>`;
            });
            document.getElementById('news-list').innerHTML = h3;
            if(activeSym) loadDetail(activeSym);
        }

        function loadDetail(sym) {
            activeSym = sym; let d = brain?.details?.[sym]; if (!d) return;
            let html = `<div style="text-align:center;">
                <h2 class="sym" style="font-size:24px; margin-bottom:10px;">${sym} ${d?.Price || '-'}</h2>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                    <div>成交量<br><b>${d?.Vol}</b></div><div>量比<br><b>${d?.RelVol}</b></div>
                    <div>漲幅<br><b class="${parseFloat(d?.Pct)>0?'up':'down'}">${d?.Pct}</b></div><div>催化<br><b style="color:var(--yellow)">${d?.CatScore}</b></div>
                </div>
                <h3 style="font-size:12px; border-bottom:1px solid var(--border); padding:5px 0; text-align:left;">🗞️ 即時情報</h3>`;
            (d?.NewsList || []).forEach(n => {
                html += `<div style="text-align:left; font-size:12px; padding:8px; border-left:3px solid ${n.is_today?'#ffa500':'#333'}; background:rgba(255,255,255,0.02); margin-top:5px;">
                    <div style="color:${n.is_today?'#ffa500':'#888'}; font-weight:bold;">${n.time}</div>
                    <a href="${n.link}" target="_blank" style="color:var(--blue); text-decoration:none;">${n.title}</a>
                </div>`;
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }

            // 初始化與定時器
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12:false}); }, 1000);
        function refresh() { fetch('/data').then(r=>r.json()).then(d=>{ brain=d; refreshUI(d); setTimeout(refresh, 5000); }).catch(()=>setTimeout(refresh, 5000)); }
        window.onload = () => { refresh(); };
    </script>
</body>
</html>
