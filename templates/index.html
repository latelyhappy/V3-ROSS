<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V43.6 - Full Neural Integration</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff; --neon-green: #39ff14; --neon-purple: #d292ff; --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e; }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-x: auto; padding-top: 50px; user-select: none; }
        #tactical-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        #tactical-bar::-webkit-scrollbar { display: none; }
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; margin-right: 10px; flex-shrink: 0;}
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); color: #fff; }
        #workspace { position: relative; width: 200vw; min-height: 150vh; padding: 10px; box-sizing: border-box; overflow: visible; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6); position: absolute; touch-action: none; }
        .window-panel::after { content: ''; position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, rgba(139, 148, 158, 0.4) 50%); z-index: 20; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 12px 15px; font-size: 13px; font-weight: bold; color: var(--text-muted); cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-weight: 500; font-size: 12px; position: sticky; top: 0; z-index: 10; padding: 12px 10px; text-align: left; box-shadow: 0 1px 0 rgba(48, 54, 61, 1); cursor: pointer;}
        td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(48, 54, 61, 0.5); font-size: 13px;}
        tr { transition: background 0.1s ease; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.06); }
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); } tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-blue .status-indicator { background: var(--blue); } tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-border .status-indicator { background: var(--text-muted); }
        tr.tr-vcp { background: rgba(227, 179, 65, 0.08); } 
        .trap-row { animation: blood-pulse 1.5s infinite; }
        @keyframes blood-pulse { 0% {background: transparent;} 50% {background: rgba(248, 81, 73, 0.2);} 100% {background: transparent;} }
        .vcp-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; overflow: hidden; }
        .vcp-bar { height: 100%; transition: width 0.5s ease, background 0.5s ease; }
        .sym { font-weight: bold; color: var(--text-main); font-size: 15px; }
        .up { color: var(--green); font-weight: bold;} .down { color: var(--red); font-weight: bold;}
        .vol-100k { color: var(--neon-purple); font-weight: bold; text-shadow: 0 0 5px rgba(210,146,255,0.3); } 
        #mobile-tabs { display: none; }
        body.mobile-mode { overflow-y: auto !important; overflow-x: hidden !important; padding-bottom: 60px; }
        body.mobile-mode #mobile-tabs { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-surface); z-index: 10000; border-top: 1px solid var(--border); }
        body.mobile-mode .tab-btn { flex: 1; padding: 15px 0; background: transparent; border: none; color: var(--text-muted); font-weight: bold; font-size: 13px; cursor: pointer; }
        body.mobile-mode .tab-btn.active { color: var(--blue); border-top: 2px solid var(--blue); background: rgba(88, 166, 255, 0.05); }
        body.mobile-mode #workspace { display: block; overflow: hidden; height: auto; min-height: auto; padding: 5px; width: 100vw; }
        body.mobile-mode .window-panel { position: static !important; width: 100% !important; height: auto !important; min-height: 85vh; transform: none !important; margin-bottom: 15px; display: none; box-shadow: none; border: none; border-bottom: 1px solid var(--border); }
        body.mobile-mode .window-panel.active-tab { display: flex !important; }
        body.mobile-mode .panel-content { flex: 1; overflow-x: auto !important; -webkit-overflow-scrolling: touch; padding-bottom: 15px; display: block; width: 100%; }
        body.mobile-mode table { font-size: 12px; width: 100%; min-width: max-content; } 
        body.mobile-mode th, body.mobile-mode td { padding: 12px 6px; white-space: nowrap; } 
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--red); color:var(--red);" onclick="unlockAudio()">🔇 音效/防睡眠</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 ETF</button>
        <div style="display:flex; align-items:center; border:1px solid var(--border); border-radius:6px; padding:4px 8px; margin-right:10px; flex-shrink: 0;"><span style="font-size:12px; color:var(--text-muted); margin-right:5px;">跳空:</span><input type="number" id="gap-input" value="5.0" step="0.5" style="background:transparent; border:none; color:var(--neon-green); width:40px; font-weight:bold; font-size:13px; outline:none;" onchange="updateGap(this.value)"><span>%</span></div>
        <div style="display:flex; align-items:center; border:1px solid var(--border); border-radius:6px; padding:2px 5px; margin-right:10px; background:rgba(0,0,0,0.2);"><button style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-weight:bold; padding:0 8px;" onclick="changeZoom(-0.1)">-</button><span id="zoom-label">100%</span><button style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-weight:bold; padding:0 8px;" onclick="changeZoom(0.1)">+</button></div>
        <button class="ghost-btn" style="border-color:var(--blue); color:var(--blue);" onclick="showAITrends()">🧠 AI 戰果詞庫</button>
        <button id="mode-btn" class="ghost-btn" style="border-color:var(--yellow); color:var(--yellow);" onclick="toggleMode()">📱 切換手機版</button>
        <button class="ghost-btn" onclick="resetLayout()">🔄 重置網格</button>
        <div style="font-size: 13px; color: var(--text-muted); margin-left:10px;">TPE: <span id="sys-clock" style="color:var(--text-main); font-weight:bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color:var(--text-muted); padding-left:15px;">📡 系統初始化...</span>
    </div>
    <div id="workspace">
        <div id="win-log" class="window-panel"><div class="panel-header"><span>🚀 即時動能日誌</span></div><div class="panel-content"><table id="surge-log-table"><thead><tr><th class="status-indicator"></th><th>時間</th><th>代碼</th><th>流通股</th><th>價格</th><th>量比</th><th>加速</th><th>跳空</th><th>成交量</th><th>漲幅 (金額)</th><th>訊號</th></tr></thead><tbody id="surge-log-body"></tbody></table></div></div>
        <div id="win-rank" class="window-panel active-tab"><div class="panel-header"><span>🏆 超新星排行</span></div><div class="panel-content"><table><thead><tr><th class="status-indicator"></th><th onclick="setSort('rank', 'Code')">代碼 <span id="sort-rank-Code"></span></th><th onclick="setSort('rank', 'Float')">流通股 <span id="sort-rank-Float"></span></th><th onclick="setSort('rank', 'Price')">價格 <span id="sort-rank-Price"></span></th><th onclick="setSort('rank', 'RelVol')">量比 <span id="sort-rank-RelVol"></span></th><th onclick="setSort('rank', 'VolAcc')">加速 <span id="sort-rank-VolAcc"></span></th><th onclick="setSort('rank', 'Gap')">跳空 <span id="sort-rank-Gap"></span></th><th>成交量</th><th onclick="setSort('rank', 'Pct')">漲幅 (金額) <span id="sort-rank-Pct">▼</span></th></tr></thead><tbody id="rank-list"></tbody></table></div></div>
        <div id="win-news" class="window-panel"><div class="panel-header"><span>🗞️ 情報雷達</span></div><div class="panel-content"><table><thead><tr><th class="status-indicator"></th><th>時間</th><th>代碼</th><th>評分</th><th>標題</th><th>流通股</th><th>價格</th><th>量比</th><th>加速</th><th>跳空</th><th>漲幅</th></tr></thead><tbody id="news-list"></tbody></table></div></div>
        <div id="win-detail" class="window-panel"><div class="panel-header">📊 深度分析與動態風控</div><div class="panel-content" id="detail-list" style="padding: 20px; user-select: text;">點擊代碼載入戰報...</div></div>
    </div>
    <div id="mobile-tabs"><button class="tab-btn active" onclick="switchTab('win-rank', this)">🏆 排行</button><button class="tab-btn" onclick="switchTab('win-log', this)">🚀 日誌</button><button class="tab-btn" onclick="switchTab('win-news', this)">🗞️ 情報</button><button class="tab-btn" onclick="switchTab('win-detail', this)">📊 戰報</button></div>

    <script>
        let brain = {}, activeSym = "", audioOn = false, played = {}, showETF = false, lastTopNewsHeadline = ""; 
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };
        let rankCfg = { col: 'Pct', asc: false }, newsCfg = { col: 'CatScore', asc: false };
        let isMobileMode = window.innerWidth <= 768;
        if (isMobileMode) document.body.classList.add('mobile-mode');

        let wakeLock = null;
        async function requestWakeLock() { try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {} }

        let currentZoom = parseFloat(localStorage.getItem('sniper_zoom')) || 1.0;
        function applyZoom() { document.body.style.zoom = currentZoom; let zl = document.getElementById('zoom-label'); if(zl) zl.innerText = Math.round(currentZoom * 100) + '%'; }
        function changeZoom(delta) { currentZoom = Math.round((currentZoom + delta) * 10) / 10; if(currentZoom < 0.5) currentZoom = 0.5; if(currentZoom > 2.0) currentZoom = 2.0; localStorage.setItem('sniper_zoom', currentZoom); applyZoom(); }

        function formatVolAcc(v) {
            if (!v || v === '-') return `<span style="color:var(--text-muted);">-</span>`;
            // 💡 升級：偵測 🩸 或 🔻 並渲染為警告紅 [cite: 105, 198]
            let color = "var(--text-muted)";
            if (v.includes('🔥') || v.includes('↗')) color = "var(--green)";
            if (v.includes('🩸') || v.includes('🔻') || v.includes('↘')) color = "var(--red)";
            if (v.includes('🧊')) color = "var(--border)";
            return `<span style="color:${color}; font-weight:bold;">${v}</span>`;
        }

        function refreshUI(d) {
            if (!d) return;
            document.getElementById('sys-status').innerText = `📡 數據更新: ${d.last_update || '--:--:--'}`; document.getElementById('sys-status').style.color = "var(--green)";
            
            let h1 = "";
            (d.surge_log || []).forEach(r => {
                if (r.Type === 'fund' && !showETF) return; 
                let isFatal = r.Signal && r.Signal.includes("💀"), rowClass = r.Status ? `tr-${r.Status}` : ""; if (r.Signal && r.Signal.includes("⚡VCP")) rowClass += " tr-vcp"; if (isFatal) rowClass += " trap-row"; 
                let f_vol = r.Is100K ? `<span class="vol-100k">${r.Vol}</span>` : (r.Vol||"-");
                // 💡 升級：漲幅補上絕對金額 (Amt) [cite: 105, 234]
                h1 += `<tr class="${rowClass}" onclick="loadDetail('${r.Code}')">
                    <td class="status-indicator"></td><td>${r.Time}</td><td class="sym">${r.Code}</td><td>${r.Float}</td><td>${r.Price}</td><td>${r.RelVol}</td><td>${formatVolAcc(r.VolAcc)}</td><td>${r.Gap}</td><td>${f_vol}</td><td class="${parseFloat(r.Pct)>0?'up':'down'}">${r.Pct} <small style="color:var(--text-muted);">(${r.Amt})</small></td><td style="font-weight:bold;">${r.Signal}</td>
                </tr>`;
                if (r.Audio === 'nova' && r.SignalTS > (played[r.SignalTS] || 0) && audioOn) { played[r.SignalTS] = r.SignalTS; sounds[r.Audio].play().catch(e=>{}); if ("vibrate" in navigator) navigator.vibrate([300, 100, 300]); }
            });
            document.getElementById('surge-log-body').innerHTML = h1;

            let h2 = "";
            let rankData = [...(d.leaderboard || [])].filter(r => !(r?.Type === 'fund' && !showETF));
            rankData.forEach(r => {
                let det = d.details[r.Code] || {}; let f_vol = det.Is100K ? `<span class="vol-100k">${r.Vol}</span>` : (r.Vol||"-");
                h2 += `<tr class="tr-${det.Status||'green'}" onclick="loadDetail('${r.Code}')">
                    <td class="status-indicator"></td><td class="sym">${r.Code}</td><td>${r.Float}</td><td>${r.Price}</td><td>${det.RelVol||'-'}</td><td>${formatVolAcc(det.VolAcc)}</td><td>${det.Gap||'-'}</td><td>${f_vol}</td><td class="${parseFloat(r.Pct)>0?'up':'down'}">${r.Pct} <small style="color:var(--text-muted);">(${det.Amt||'-'})</small></td>
                </tr>`;
            });
            document.getElementById('rank-list').innerHTML = h2;
            if(activeSym) loadDetail(activeSym);
        }

        function loadDetail(sym) {
            activeSym = sym; let d = (brain.details && brain.details[sym]) ? brain.details[sym] : null; if (!d) return;
            // 💡 升級：詳情面板整合動態停損線與 VCP 壓縮進度條 [cite: 105, 272, 278]
            let vcpHTML = ""; if (d.Signal && d.Signal.includes("VCP")) { let m = d.Signal.match(/\((\d+)m\)/), mins = m ? parseInt(m[1]) : 1; vcpHTML = `<div style="font-size:11px; color:var(--text-muted);">⚡ 壓縮蓄力 (${mins} mins)</div><div class="vcp-bar-container"><div class="vcp-bar" style="width:${Math.min(mins*10,100)}%; background:${mins>=10?'#fff':'#ffa500'};"></div></div>`; }
            
            let snScore = d.SN_Score || 0, snColor = snScore >= 400 ? "var(--neon-green)" : (snScore >= 200 ? "var(--yellow)" : "var(--red)");
            let fillRatio = Math.min(snScore / 600, 1), dashOffset = 141.37 * (1 - fillRatio);

            let html = `<div style="text-align:center;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom:10px;">
                    <div style="text-align:left;">
                        <h2 class="sym" style="font-size:28px; margin:0;">${sym} <span style="font-size:18px; color:var(--text-muted);">${d.Price}</span></h2>
                        <div style="margin-top:5px; font-size:12px; color:${d.VsaState>0?'var(--red)':'var(--green)'}; font-weight:bold;">${d.VsaState==2?'🚨 致命出貨 (爆量滯漲)':(d.VsaState==1?'⚠️ 背離警告':'✅ 量價配合健康')}</div>
                        <div style="margin-top:5px; font-size:13px; color:var(--text-main);">🛡️ 動態防守線: <b style="color:var(--red);">$${d.StopLoss.toFixed(2)}</b></div>
                    </div>
                    <div style="position:relative; width:120px; height:70px;">
                        <svg viewBox="0 0 120 70"><path d="M 15 60 A 45 45 0 0 1 105 60" fill="none" stroke="var(--border)" stroke-width="10" stroke-linecap="round"/><path d="M 15 60 A 45 45 0 0 1 105 60" fill="none" stroke="${snColor}" stroke-width="10" stroke-linecap="round" stroke-dasharray="141.37" stroke-dashoffset="${dashOffset}" style="transition: stroke-dashoffset 1s ease-out;"/></svg>
                        <div style="position:absolute; bottom:5px; left:0; width:100%; text-align:center;"><div style="font-size:22px; font-weight:900; color:${snColor};">${snScore}</div><div style="font-size:10px; color:var(--text-muted);">SN-SCORE</div></div>
                    </div>
                </div>
                <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; font-size:12px; border:1px solid var(--border);">
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">成交量<br><b>${d.Vol}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">量比<br><b>${d.RelVol}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">加速<br>${formatVolAcc(d.VolAcc)}</div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">跳空<br><b class="${parseFloat(d.Gap)>0?'up':'down'}">${d.Gap}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">催化<br><b style="color:var(--yellow);">${d.CatScore}</b></div>
                    <div style="grid-column:span 2; text-align:left;">籌碼: <b>${d.Float}</b></div>
                    <div style="grid-column:span 3; text-align:left;">訊號: <b style="color:var(--yellow);">${d.Signal}</b></div>
                    <div style="grid-column:1/-1;">${vcpHTML}</div>
                </div>
                <h3 style="color:var(--text-muted); font-size:12px; border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:12px; text-align:left;">🗞️ 情報分析</h3>`;
            
            if (d.NewsList.length === 0) html += `<div style="text-align:left; color:var(--text-muted); font-size:13px;">近 3 日無新聞。</div>`;
            else d.NewsList.forEach(n => { html += `<div style="margin-bottom:8px; text-align:left; padding:10px; background:rgba(255,255,255,0.02); border-radius:6px; border-left:3px solid ${n.is_today?'#ffa500':'var(--border)'};"><div style="color:var(--text-muted); font-size:11px; margin-bottom:4px;">${n.time}</div><a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--text-main); font-size:13px;">${n.title}</a></div>`; });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }

        function updateGap(val) { fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ gap_pct: parseFloat(val) }) }).then(r => r.json()); }
        function toggleMode() { isMobileMode = !isMobileMode; document.body.classList.toggle('mobile-mode'); if(!isMobileMode) initWindowManager(); }
        function switchTab(id, btn) { document.querySelectorAll('.window-panel').forEach(el => el.classList.remove('active-tab')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active-tab'); btn.classList.add('active'); }
        function setSort(t, col) { let cfg = t==='rank'?rankCfg:newsCfg; if(cfg.col===col) cfg.asc=!cfg.asc; else {cfg.col=col; cfg.asc=false;} refreshUI(brain); }
        function unlockAudio() { audioOn = true; let btn = document.getElementById('audio-btn'); btn.style.borderColor="var(--green)"; btn.style.color="var(--green)"; btn.innerText="🔊 警報/防睡眠"; requestWakeLock(); }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }
        function resetLayout() { localStorage.clear(); location.reload(); }
        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false}); }, 1000);
        function refresh() { fetch('/data?t=' + Date.now()).then(r => r.json()).then(d => { brain = d; refreshUI(d); setTimeout(refresh, 5000); }).catch(() => setTimeout(refresh, 5000)); }
        function showAITrends() { if (!brain || !brain.live_trends) return; let msg = `🔥 AI 戰果詞庫：\n\n`; Object.keys(brain.live_trends).forEach(k => { msg += `► 【 ${k} 】 (權重: ${brain.live_trends[k].score} | 期望: +${brain.live_trends[k].avg_impact_pct}%)\n`; }); alert(msg); }
        function initWindowManager() { if (isMobileMode) return; ['win-log', 'win-rank', 'win-news', 'win-detail'].forEach(id => { const el = document.getElementById(id); let s = JSON.parse(localStorage.getItem('sniper_v42_layout_' + id)) || {x:10, y:10, w:600, h:400}; el.style.width = s.w+'px'; el.style.height = s.h+'px'; el.style.transform = `translate(${s.x}px, ${s.y}px)`; el.setAttribute('data-x', s.x); el.setAttribute('data-y', s.y); interact(el).draggable({ allowFrom:'.panel-header', listeners:{move:e=>{let t=e.target, x=(parseFloat(t.getAttribute('data-x'))||0)+(e.dx/currentZoom), y=(parseFloat(t.getAttribute('data-y'))||0)+(e.dy/currentZoom); t.style.transform=`translate(${x}px, ${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y);}, end:sL}}).resizable({ edges:{right:true, bottom:true}, listeners:{move:e=>{let t=e.target; t.style.width=(e.rect.width/currentZoom)+'px'; t.style.height=(e.rect.height/currentZoom)+'px';}, end:sL}}); }); }
        function sL() { ['win-log','win-rank','win-news','win-detail'].forEach(id=>{ let el=document.getElementById(id); localStorage.setItem('sniper_v42_layout_'+id, JSON.stringify({x:parseFloat(el.getAttribute('data-x'))||0, y:parseFloat(el.getAttribute('data-y'))||0, w:el.offsetWidth, h:el.offsetHeight})); }); }
        window.onload = () => { applyZoom(); initWindowManager(); refresh(); };
    </script>
</body>
</html>
