<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper V42.0 - Night Vision Command</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --yellow: #e3b341; --purple: #a371f7; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
            --neon-green: #39ff14; /* 💡 V42 夜視鏡螢光綠 */
            --bg-base: #0d1117; --bg-surface: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-muted: #8b949e; 
        }
        body { margin: 0; background: var(--bg-base); color: var(--text-main); font-family: -apple-system, sans-serif; overflow-y: auto; overflow-x: hidden; padding-top: 50px; user-select: none; }
        #tactical-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: rgba(13, 17, 23, 0.95); border-bottom: 1px solid var(--border); z-index: 9999; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .ghost-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 6px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s ease; margin-right: 10px; }
        .ghost-btn:hover { background: rgba(163, 113, 247, 0.2); border-color: var(--purple); color: #fff; }
        #workspace { position: relative; width: 100vw; min-height: 150vh; padding: 10px; box-sizing: border-box; overflow: hidden; }
        .window-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.6); position: absolute; touch-action: none; }
        .window-panel::after { content: ''; position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize; background: linear-gradient(135deg, transparent 50%, rgba(139, 148, 158, 0.4) 50%); z-index: 20; }
        .panel-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 12px 15px; font-size: 13px; font-weight: bold; color: var(--text-muted); cursor: move; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; position: relative; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; color: var(--text-muted); font-weight: 500; font-size: 12px; position: sticky; top: 0; z-index: 10; padding: 12px 10px; text-align: left; box-shadow: 0 1px 0 rgba(48, 54, 61, 1); cursor: pointer;}
        th:hover { color: #fff; background: rgba(255,255,255,0.05); }
        td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(48, 54, 61, 0.5); font-size: 13px;}
        tr { transition: background 0.1s ease; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.06); }
        .status-indicator { width: 4px; padding: 0 !important; }
        tr.tr-yellow .status-indicator { background: var(--yellow); } tr.tr-purple .status-indicator { background: var(--purple); }
        tr.tr-blue .status-indicator { background: var(--blue); } tr.tr-green .status-indicator { background: var(--green); }
        tr.tr-border .status-indicator { background: var(--text-muted); } /* 洗盤色 */
        tr.tr-vcp { background: rgba(227, 179, 65, 0.08); } 
        .trap-row { animation: blood-pulse 1.5s infinite; }
        @keyframes blood-pulse { 0% {background: transparent;} 50% {background: rgba(248, 81, 73, 0.2);} 100% {background: transparent;} }
        .translating { color: #8b949e; animation: text-pulse 2s infinite; font-size: 11px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-left: 5px; }
        @keyframes text-pulse { 0% {opacity: 0.4;} 50% {opacity: 1;} 100% {opacity: 0.4;} }
        .sym { font-weight: bold; color: var(--text-main); font-size: 15px; }
        .up { color: var(--green); font-weight: bold;} .down { color: var(--red); font-weight: bold;}
        
        /* 💡 V42 夜視鏡 CSS */
        .elite-news-row { background: rgba(255,255,255,0.03); }
        .elite-title { color: #e1e4e8 !important; } /* 灰白高對比標題 */
        .neon-word { color: var(--neon-green); font-weight: 900; text-shadow: 0 0 5px rgba(57,255,20,0.4); }
    </style>
</head>
<body>
    <div id="tactical-bar">
        <button id="audio-btn" class="ghost-btn" style="border-color:var(--red); color:var(--red);" onclick="unlockAudio()">🔇 啟用音效</button>
        <button id="etf-btn" class="ghost-btn" onclick="toggleETF()">🔘 顯示 ETF / 槓桿</button>
        <button class="ghost-btn" style="border-color:var(--blue); color:var(--blue);" onclick="showAITrends()">🧠 查看 AI 學習詞彙</button>
        <button class="ghost-btn" onclick="resetLayout()">🔄 重置版面</button>
        <div style="font-size: 13px; color: var(--text-muted); font-family: monospace; margin-left:10px;">TPE: <span id="sys-clock" style="color: var(--text-main); font-weight: bold;">--:--:--</span></div>
        <span id="sys-status" style="margin-left:auto; font-size:11px; color: var(--text-muted);">📡 系統初始化...</span>
    </div>

    <div id="workspace">
        <div id="win-log" class="window-panel">
            <div class="panel-header"><span>🚀 即時動能日誌 (V42 量能加速版)</span><span style="font-size: 11px; color:var(--text-muted);">單擊看新聞 / 雙擊開圖</span></div>
            <div class="panel-content">
                <table id="surge-log-table">
                    <thead><tr><th class="status-indicator"></th><th>時間</th><th>代碼</th><th>流通股</th><th>價格</th><th>量比</th><th>成交量</th><th>漲幅</th><th>訊號</th></tr></thead>
                    <tbody id="surge-log-body"><tr><td colspan="9" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="win-rank" class="window-panel">
            <div class="panel-header"><span>🏆 超新星排行 ($1-$30)</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('rank', 'Code')">代碼 <span id="sort-rank-Code"></span></th>
                        <th onclick="setSort('rank', 'Float')">流通股 <span id="sort-rank-Float"></span></th>
                        <th onclick="setSort('rank', 'Price')">價格 <span id="sort-rank-Price"></span></th>
                        <th onclick="setSort('rank', 'RelVol')">量比 <span id="sort-rank-RelVol"></span></th>
                        <th onclick="setSort('rank', 'Vol')">成交量 <span id="sort-rank-Vol"></span></th>
                        <th onclick="setSort('rank', 'Pct')">漲幅 <span id="sort-rank-Pct">▼</span></th>
                    </tr></thead>
                    <tbody id="rank-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-news" class="window-panel">
            <div class="panel-header"><span>🗞️ 情報雷達 (夜視鏡模式)</span></div>
            <div class="panel-content">
                <table>
                    <thead><tr>
                        <th class="status-indicator"></th>
                        <th onclick="setSort('news', 'time')">時間 <span id="sort-news-time"></span></th>
                        <th onclick="setSort('news', 'Code')">代碼 <span id="sort-news-Code"></span></th>
                        <th onclick="setSort('news', 'CatScore')">評分 <span id="sort-news-CatScore">▼</span></th>
                        <th>標題</th>
                        <th onclick="setSort('news', 'Price')">價格 <span id="sort-news-Price"></span></th>
                        <th onclick="setSort('news', 'RelVol')">量比 <span id="sort-news-RelVol"></span></th>
                        <th onclick="setSort('news', 'Pct')">漲幅 <span id="sort-news-Pct"></span></th>
                    </tr></thead>
                    <tbody id="news-list"></tbody>
                </table>
            </div>
        </div>

        <div id="win-detail" class="window-panel">
            <div class="panel-header">📊 深度分析與動態風控</div>
            <div class="panel-content" id="detail-list" style="padding: 20px; user-select: text;">
                <div style="text-align:center; color: var(--text-muted); padding: 60px 0;">點擊代碼載入戰報...</div>
            </div>
        </div>
    </div>

    <script>
        let brain = {}, activeSym = "", audioOn = false, played = {}, showETF = false, lastTopNewsHeadline = ""; 
        const sounds = { spark: new Audio('/static/sounds/spark.mp3'), nova: new Audio('/static/sounds/nova.mp3') };
        let rankCfg = { col: 'Pct', asc: false }, newsCfg = { col: 'CatScore', asc: false };

        function parseValue(val, col) {
            if (val === undefined || val === null || val === '-') return -999999;
            if (typeof val === 'string' && val.includes('N/A')) return -999999;
            if (col === 'Code' || col === 'time') return val.toString(); 
            let str = val.toString();
            let num = parseFloat(str.replace(/[^0-9.-]/g, '')) || 0; 
            if (col === 'Vol' || col === 'Float') {
                if (str.includes('M')) return num * 1000000;
                if (str.includes('K')) return num * 1000;
            }
            return num;
        }

        function setSort(table, col) {
            let cfg = table === 'rank' ? rankCfg : newsCfg;
            if (cfg.col === col) cfg.asc = !cfg.asc; 
            else { cfg.col = col; cfg.asc = false; }
            document.querySelectorAll(`[id^="sort-${table}-"]`).forEach(el => el.innerText = "");
            document.getElementById(`sort-${table}-${col}`).innerText = cfg.asc ? "▲" : "▼";
            if (Object.keys(brain).length > 0) refreshUI(brain); 
        }

        function showAITrends() {
            if (!brain || !brain.live_trends) return alert("📡 系統尚未載入...");
            let msg = `🔥 V42 NLP 引擎 (歷史勝率校準中)：\n📅 完成時間：${brain.trends_date || '未知'}\n\n`;
            Object.keys(brain.live_trends).forEach(k => { msg += `► 【 ${k} 】 (權重: ${brain.live_trends[k]})\n`; });
            alert(msg);
        }

        function initWindowManager() {
            if (window.innerWidth <= 1024) return; 
            const wins = ['win-log', 'win-rank', 'win-news', 'win-detail'];
            const defL = {'win-log':{x:10,y:10,w:750,h:450},'win-rank':{x:10,y:480,w:750,h:450},'win-news':{x:780,y:480,w:650,h:450},'win-detail':{x:780,y:10,w:650,h:450}};
            wins.forEach(id => {
                const el = document.getElementById(id); if (!el) return;
                let s = JSON.parse(localStorage.getItem('sniper_v42_layout_' + id)) || defL[id];
                el.style.width = s.w+'px'; el.style.height = s.h+'px'; el.style.transform = `translate(${s.x}px, ${s.y}px)`;
                el.setAttribute('data-x', s.x); el.setAttribute('data-y', s.y);
                interact(el).draggable({ allowFrom:'.panel-header', listeners:{move:dML, end:sL} }).resizable({ edges:{right:true, bottom:true}, listeners:{move:rML, end:sL} });
            });
        }
        function dML(e) { let t=e.target, x=(parseFloat(t.getAttribute('data-x'))||0)+e.dx, y=(parseFloat(t.getAttribute('data-y'))||0)+e.dy; t.style.transform=`translate(${x}px, ${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y); }
        function rML(e) { let t=e.target, x=(parseFloat(t.getAttribute('data-x'))||0), y=(parseFloat(t.getAttribute('data-y'))||0); t.style.width=e.rect.width+'px'; t.style.height=e.rect.height+'px'; t.style.transform=`translate(${x}px, ${y}px)`; t.setAttribute('data-x',x); t.setAttribute('data-y',y); }
        function sL() { ['win-log','win-rank','win-news','win-detail'].forEach(id=>{ let el=document.getElementById(id); if(el) localStorage.setItem('sniper_v42_layout_'+id, JSON.stringify({x:parseFloat(el.getAttribute('data-x'))||0, y:parseFloat(el.getAttribute('data-y'))||0, w:el.offsetWidth, h:el.offsetHeight})); }); }
        function resetLayout() { localStorage.clear(); location.reload(); }
        
        function toggleETF() { showETF = !showETF; let btn = document.getElementById('etf-btn'); if (showETF) { btn.innerText = "🔘 隱藏 ETF"; btn.style.borderColor = "var(--red)"; btn.style.color = "var(--red)"; } else { btn.innerText = "🔘 顯示 ETF"; btn.style.borderColor = "var(--border)"; btn.style.color = "var(--text-main)"; } if (Object.keys(brain).length > 0) refreshUI(brain); }
        function unlockAudio() { audioOn = true; let btn = document.getElementById('audio-btn'); btn.style.borderColor="var(--green)"; btn.style.color="var(--green)"; btn.innerText="🔊 音效已啟用"; }
        function openTW(s) { window.open(`https://www.tradingview.com/chart/?symbol=${s}`, '_blank'); }

        setInterval(() => { document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('zh-TW', {timeZone: 'Asia/Taipei', hour12: false}); }, 1000);
        
        function refresh() {
            fetch('/data?t=' + Date.now())
                .then(r => r.json())
                .then(d => { brain = d; refreshUI(d); setTimeout(refresh, 5000); })
                .catch(e => { 
                    document.getElementById('sys-status').innerText = "⚠️ 網路閃斷，重連中..."; 
                    document.getElementById('sys-status').style.color = "var(--red)"; 
                    setTimeout(refresh, 5000); 
                });
        }

        function highlightElites(text, elites) {
            if (!elites || elites.length === 0) return text;
            let res = text;
            elites.forEach(w => {
                let regex = new RegExp(`\\b${w}\\b`, 'gi');
                res = res.replace(regex, `<span class="neon-word">$&</span>`);
            });
            return res;
        }

        function refreshUI(d) {
            if (!d) return;
            document.getElementById('sys-status').innerText = `📡 數據更新: ${d.last_update || '--:--:--'}`;
            document.getElementById('sys-status').style.color = "var(--green)";
            
            // 1. 日誌
            let h1 = "";
            (d.surge_log || []).forEach(r => {
                if (r.Type === 'fund' && !showETF) return; 
                let det = (d.details && d.details[r.Code]) ? d.details[r.Code] : {};
                let isFatal = r.Signal && r.Signal.includes("💀"), icon = isFatal ? " 💀" : ((det.CatScore || 0) > 8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                let rowClass = r.Status ? `tr-${r.Status}` : ""; if (r.Signal && r.Signal.includes("⚡VCP")) rowClass += " tr-vcp"; if (isFatal) rowClass += " trap-row"; 
                let f_float = r.Type === 'fund' ? '<span style="color:var(--border);">N/A(ETF)</span>' : (r.Float||'-');
                h1 += `<tr class="${rowClass}" onclick="loadDetail('${r.Code}')" ondblclick="openTW('${r.Code}')">
                    <td class="status-indicator"></td><td style="color:var(--text-muted);">${r.Time||'-'}</td><td class="sym">${r.Code}${icon}</td>
                    <td style="color:var(--text-muted);">${f_float}</td><td>${r.Price||'-'}</td><td>${r.RelVol||'-'}</td><td>${r.Vol||'-'}</td>
                    <td class="${parseFloat(r.Pct||0)>0?'up':'down'}">${r.Pct||'-'}</td><td style="font-weight:bold;">${r.Signal||'-'}</td>
                </tr>`;
                if (r.Audio && r.SignalTS > (played[r.SignalTS] || 0) && audioOn) { played[r.SignalTS] = r.SignalTS; sounds[r.Audio].currentTime=0; sounds[r.Audio].play().catch(e=>{}); }
            });
            document.getElementById('surge-log-body').innerHTML = h1 || `<tr><td colspan="9" style="text-align:center; padding: 40px; color: var(--text-muted);">等待極端動能訊號觸發</td></tr>`;

            // 2. 排行
            let h2 = "", rankData = [...(d.leaderboard || [])].filter(r => !(r?.Type === 'fund' && !showETF));
            rankData.sort((a, b) => {
                let detA = d.details[a.Code] || {}, detB = d.details[b.Code] || {};
                let vA = (rankCfg.col==='Float') ? (a.Float||detA.Float) : ((rankCfg.col==='RelVol') ? (detA.RelVol||a.RelVol) : a[rankCfg.col]);
                let vB = (rankCfg.col==='Float') ? (b.Float||detB.Float) : ((rankCfg.col==='RelVol') ? (detB.RelVol||b.RelVol) : b[rankCfg.col]);
                vA = parseValue(vA, rankCfg.col); vB = parseValue(vB, rankCfg.col);
                if (vA < vB) return rankCfg.asc ? -1 : 1; if (vA > vB) return rankCfg.asc ? 1 : -1; return 0;
            });
            rankData.forEach(r => {
                let det = d.details[r.Code] || {}, isFatal = det.IsTrap;
                let icon = isFatal ? " 💀" : ((det.CatScore||0)>8 ? " 🔥📰" : (det.HasNews ? " 📰" : ""));
                let rowClass = `tr-${det.Status || r.Status || 'green'}`; if (isFatal) rowClass += " trap-row";
                h2 += `<tr class="${rowClass}" onclick="loadDetail('${r.Code}')" ondblclick="openTW('${r.Code}')">
                    <td class="status-indicator"></td><td class="sym">${r.Code}${icon}</td><td style="color:var(--text-muted);">${r.Type==='fund'?'N/A':(r.Float||det.Float||"-")}</td>
                    <td>${r.Price||'-'}</td><td>${det.RelVol||r.RelVol||'-'}</td><td>${r.Vol||'-'}</td><td class="${parseFloat(r.Pct||0)>0?'up':'down'}">${r.Pct||'-'}</td>
                </tr>`;
            });
            document.getElementById('rank-list').innerHTML = h2 || `<tr><td colspan="7" style="text-align:center; padding:20px; color:var(--text-muted);">無符合標的</td></tr>`;

            // 3. 新聞 (V42 夜視鏡模式)
            let h3 = "";
            if (d.top_catalysts && d.top_catalysts.length > 0) {
                let fVN = d.top_catalysts.find(n => n.NewsList && n.NewsList.length > 0);
                let cLH = fVN ? (fVN.NewsList[0].headline || fVN.NewsList[0].raw_title) : "";
                if (lastTopNewsHeadline !== "" && lastTopNewsHeadline !== cLH && audioOn) { sounds.nova.currentTime=0; sounds.nova.play().catch(e=>{}); }
                lastTopNewsHeadline = cLH;
                
                let newsData = [...d.top_catalysts].filter(n => !(n?.Type === 'fund' && !showETF) && n?.NewsList && n.NewsList.length > 0);
                newsData.sort((a, b) => {
                    let vA, vB;
                    if (newsCfg.col === 'time') { vA = a.NewsList[0]?.time||""; vB = b.NewsList[0]?.time||""; } 
                    else if (newsCfg.col === 'CatScore') { vA = a.CatScore!==undefined ? a.CatScore : (a.score||0); vB = b.CatScore!==undefined ? b.CatScore : (b.score||0); } 
                    else { vA = a[newsCfg.col]; vB = b[newsCfg.col]; }
                    vA = parseValue(vA, newsCfg.col); vB = parseValue(vB, newsCfg.col);
                    if (vA < vB) return newsCfg.asc ? -1 : 1; if (vA > vB) return newsCfg.asc ? 1 : -1; return 0;
                });

                newsData.forEach(n => {
                    let latest = n.NewsList[0];
                    let isElite = latest.elites && latest.elites.length > 0;
                    let hl_text = latest.title === "⏳ 翻譯中..." ? latest.raw_title : latest.title;
                    
                    // 💡 螢光綠高亮處理
                    hl_text = highlightElites(hl_text, latest.elites);
                    if (latest.title === "⏳ 翻譯中...") hl_text += ` <span class="translating">⏳翻譯中...</span>`;

                    let f_Score = n.CatScore !== undefined ? n.CatScore : (n.score || 0);
                    let rowClass = isElite ? "elite-news-row" : "tr-green";
                    let titleClass = isElite ? "elite-title" : "";

                    h3 += `<tr class="${rowClass}" onclick="loadDetail('${n.Code||n.ticker}')" ondblclick="openTW('${n.Code||n.ticker}')">
                        <td class="status-indicator" style="background:${f_Score >= 6 ? 'var(--yellow)' : 'var(--border)'};"></td>
                        <td style="color:${latest.is_today?'#ffa500':'var(--text-muted)'}; font-size:11px;">${latest.time||'-'}</td>
                        <td class="sym">${n.Code||n.ticker}</td><td style="color:${f_Score>=6?'var(--yellow)':'var(--text-muted)'}; font-weight:bold;">${f_Score}</td>
                        <td class="${titleClass}" style="font-size:12px; line-height:1.4; max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${hl_text}</td>
                        <td>${n.Price||"-"}</td>
                        <td style="color:var(--text-muted);">${n.RelVol||"-"}</td>
                        <td class="${parseFloat(n.Pct)>0?'up':'down'}" style="font-weight:bold;">${n.Pct||"-"}</td>
                    </tr>`;
                });
                document.getElementById('news-list').innerHTML = h3 || `<tr><td colspan="8" style="text-align:center; padding:20px; color:var(--text-muted);">符合條件之情報已過濾</td></tr>`;
            } else { document.getElementById('news-list').innerHTML = `<tr><td colspan="8" style="text-align:center; padding:20px; color:var(--text-muted);">今日尚無重大情報</td></tr>`; }
            if(activeSym) loadDetail(activeSym);
        }

        function loadDetail(sym) {
            activeSym = sym; let d = (brain.details && brain.details[sym]) ? brain.details[sym] : null; let rankData = brain.leaderboard ? brain.leaderboard.find(x => x.Code === sym) : null;
            if (!d && !rankData) return; if (!d && rankData) d = { Price:rankData.Price, Pct:rankData.Pct, Vol:rankData.Vol, RelVol:"-", Float:rankData.Type==='fund'?"N/A(ETF)":(rankData.Float||"-"), StopLoss:0, CatScore:0, IsTrap:false, NewsList:[] };
            
            let trapWarn = d.IsTrap ? `<div style="background:rgba(248,81,73,0.2); border:1px solid var(--red); color:var(--red); padding:8px; margin-bottom:10px; border-radius:6px; font-weight:bold; font-size:13px; animation:blood-pulse 1s infinite;">🩸 致命警告：偵測到 S-1/S-3 增發稀釋</div>` : "";

            let html = `<div style="text-align:center;">${trapWarn}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
                    <h2 class="sym" style="font-size:26px; margin:0;">${sym} <span style="font-size:18px; color:var(--text-muted);">${d.Price||'-'}</span></h2>
                    <button class="ghost-btn" style="padding:4px 10px; font-size:12px;" onclick="openTW('${sym}')">TV ↗</button>
                </div>
                <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; font-size:12px; border:1px solid rgba(255,255,255,0.05);">
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">成交量<br><b style="color:var(--text-main); font-size:14px;">${d.Vol||'-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">量比<br><b style="color:var(--text-main); font-size:14px;">${d.RelVol||'-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">漲幅<br><b class="${parseFloat(d.Pct||0)>0?'up':'down'}" style="font-size:14px;">${d.Pct||'-'}</b></div>
                    <div style="background:rgba(255,255,255,0.02); padding:6px; text-align:center;">催化<br><b style="color:var(--yellow); font-size:14px;">${d.CatScore||0}</b></div>
                    <div style="grid-column:span 4; padding-left:4px;">當前狀態: <b style="color:${d.Signal.includes('洗盤')?'var(--text-muted)':'var(--yellow)'};">${d.Signal||'掃描中...'}</b></div>
                </div>
                <h3 style="color:var(--text-muted); font-size:12px; border-bottom:1px solid var(--border); padding-bottom:4px; margin-top:12px; margin-bottom:8px; text-align:left;">🗞️ 情報分析</h3>`;
            
            if (!d.NewsList || d.NewsList.length === 0) html += `<div style="text-align:left; color:var(--text-muted); font-size:13px;">近 3 日無新聞。</div>`;
            else d.NewsList.forEach(n => { 
                let d_title = n.title==="⏳ 翻譯中..."?n.raw_title:n.title;
                d_title = highlightElites(d_title, n.elites);
                html += `<div style="margin-bottom:8px; text-align:left; padding:10px; background:rgba(255,255,255,0.02); border-radius:6px; border-left:3px solid ${n.elites.length>0?'var(--neon-green)':(n.is_today?'#ffa500':'var(--border)')};"><div style="color:${n.is_today?'#ffa500':'var(--text-muted)'}; font-size:11px; margin-bottom:4px; font-weight:bold;">${n.time} | 權重: ${n.score}</div><a href="${n.link}" target="_blank" style="text-decoration:none; color:var(--text-main); font-size:13px;">${d_title}</a></div>`; 
            });
            document.getElementById('detail-list').innerHTML = html + `</div>`;
        }
        window.onload = () => { initWindowManager(); refresh(); };
    </script>
</body>
</html>
